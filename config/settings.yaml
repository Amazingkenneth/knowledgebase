# Runtime settings. Values can be overridden via env vars (KB_<UPPER>__<NESTED>).
# See src/kb/config.py for the schema.

es:
  # docker-compose runs ES with xpack.security.enabled=false — use plain HTTP.
  # For a secure cluster: change to https, set ssl_fingerprint, username, password.
  url: "http://localhost:9200"
  index_prefix: "kb"
  request_timeout_s: 10
  verify_certs: false
  # ssl_fingerprint: ""   # set for HTTPS with self-signed cert
  # username: "elastic"
  # password: ""          # override via KB_ES__PASSWORD env var

embedding:
  url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "text-embedding-v3"
  dims: 1024
  batch_size: 10  # DashScope's hard limit is 10 per request
  timeout_s: 30

search:
  # If a strict search returns more than this, the response is `too_many` instead of `strict_hit`.
  # Tuned per the thoughts.md guidance: prefer asking the user to narrow down over dumping many docs.
  strict_max_hits: 8
  # Title field weight in BM25 (vs body at 1.0).
  title_boost: 3.0
  # Number of top keyword-recall candidates that get BM25+vector re-ranking (rescore window).
  rrf_window: 50
  # Vector score weight in the ranking blend.
  # final_score = (1 - vector_weight) * BM25 + vector_weight * (cosine_sim + 1)
  vector_weight: 0.5

taxonomy:
  path: "config/taxonomy.yaml"
