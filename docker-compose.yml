services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: kb-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health | grep -q '\"status\":\"\\(green\\|yellow\\)\"'"]
      interval: 5s
      timeout: 5s
      retries: 30

  # IK analyzer plugin must be installed into the ES container.
  # Run once after first `docker compose up -d elasticsearch`:
  #   docker exec -it kb-es bin/elasticsearch-plugin install \
  #     https://release.infinilabs.com/analysis-ik/stable/elasticsearch-analysis-ik-8.15.3.zip
  #   docker restart kb-es

volumes:
  es-data:
