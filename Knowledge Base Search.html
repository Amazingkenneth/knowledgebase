<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>知识库检索 · Knowledge Base Search</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
/* ============================================================
   Knowledge Base Search — design tokens
   Clean enterprise neutral, restrained accent.
   ============================================================ */

:root {
  --bg:        #FAFAF7;
  --surface:   #FFFFFF;
  --surface-2: #F5F4EE;
  --border:    #E8E5DC;
  --border-2:  #D9D5C8;
  --ink:       #1A1A19;
  --ink-1:     #2E2D2A;
  --ink-2:     #57544D;
  --muted:     #8E8B82;
  --muted-2:   #B7B4AA;
  --accent:    #4F4FAE;
  --accent-soft: oklch(0.95 0.03 265);
  --on-accent: #FFFFFF;
  --strict:    #2E8C5B;
  --loose:     #C68C26;
  --danger:    #C04545;

  --radius:    8px;
  --radius-sm: 6px;
  --radius-lg: 12px;

  --shadow-1: 0 1px 0 rgba(20, 18, 12, 0.04);
  --shadow-2: 0 4px 16px -8px rgba(20, 18, 12, 0.18), 0 1px 0 rgba(20, 18, 12, 0.04);
  --shadow-3: 0 16px 48px -16px rgba(20, 18, 12, 0.28), 0 2px 6px -2px rgba(20, 18, 12, 0.1);

  --font-zh: "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft Yahei", sans-serif;
  --font-latin: "Geist", "Inter", -apple-system, sans-serif;
  --font-mono: "JetBrains Mono", "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
  --font: var(--font-zh), var(--font-latin);

  --pad-x: 32px;
  --gap-row: 14px;
}

[data-density="compact"] {
  --gap-row: 10px;
}

* { box-sizing: border-box; }

html, body, #root {
  margin: 0;
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-size: 14.5px;
  line-height: 1.55;
}

button {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
}

input {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

.mono {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  font-feature-settings: "ss01";
}
.mono.mini {
  font-size: 9px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ============================================================
   App shell
   ============================================================ */

.app {
  min-height: 100%;
  display: flex;
  flex-direction: column;
}

.app-header {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 0 var(--pad-x);
  height: 56px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 8px;
  margin-left: -8px;
  border-radius: 8px;
}
.brand:hover { background: var(--surface-2); }
.brand-mark {
  width: 22px;
  height: 22px;
  display: grid;
  place-items: center;
  color: var(--accent);
  border-radius: 4px;
}
.brand-name {
  display: flex;
  flex-direction: column;
  line-height: 1.05;
  text-align: left;
}
.brand-zh {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.brand-en {
  font-family: var(--font-latin);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.header-nav {
  display: flex;
  gap: 4px;
  margin-left: 8px;
}
.nav-item {
  padding: 7px 12px;
  border-radius: 6px;
  font-size: 13.5px;
  color: var(--ink-2);
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.nav-item:hover { background: var(--surface-2); color: var(--ink); }
.nav-active { color: var(--ink); background: var(--surface-2); }
.nav-en {
  font-family: var(--font-latin);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 14px;
}

.domain-switch {
  display: inline-flex;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 2px;
}
.switch-btn {
  display: inline-flex;
  align-items: baseline;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 6px;
  font-size: 12.5px;
  color: var(--ink-2);
}
.switch-on {
  background: var(--surface);
  color: var(--ink);
  box-shadow: var(--shadow-1);
}
.switch-en {
  font-family: var(--font-latin);
  font-size: 9.5px;
  color: var(--muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.switch-on .switch-en { color: var(--ink-2); }

.user-pip {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--accent-soft);
  color: var(--accent);
  display: grid;
  place-items: center;
  font-family: var(--font-latin);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
}

.app-body {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ============================================================
   Landing
   ============================================================ */

.landing {
  max-width: 1080px;
  margin: 0 auto;
  padding: 56px var(--pad-x) 80px;
  width: 100%;
}

.landing-hero {
  margin-bottom: 72px;
}

.hero-eyebrow {
  display: inline-flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 22px;
}
.eyebrow-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  align-self: center;
}
.eyebrow-zh {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-1);
}
.eyebrow-en {
  font-family: var(--font-latin);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.hero-title {
  font-size: 38px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.2;
  margin: 0 0 12px;
  max-width: 780px;
  text-wrap: pretty;
}
.hero-accent {
  color: var(--accent);
}

.hero-sub {
  font-family: var(--font-latin);
  font-size: 14.5px;
  color: var(--muted);
  margin: 0 0 32px;
}

.search-box {
  display: flex;
  align-items: center;
  gap: 12px;
  height: 56px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 0 18px;
  box-shadow: var(--shadow-2);
  transition: border-color 120ms, box-shadow 120ms;
}
.search-box:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-soft), var(--shadow-2);
}
.search-box svg { color: var(--ink-2); flex-shrink: 0; }
.search-box input {
  flex: 1;
  border: none;
  outline: none;
  background: none;
  font-size: 16px;
  color: var(--ink);
}
.search-box input::placeholder { color: var(--muted-2); }

.search-actions {
  display: flex;
  align-items: center;
  gap: 14px;
}
.search-hint {
  font-family: var(--font-latin);
  font-size: 11.5px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.kbd {
  display: inline-block;
  padding: 1px 6px;
  border: 1px solid var(--border-2);
  border-bottom-width: 2px;
  border-radius: 4px;
  background: var(--surface);
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--ink-1);
  line-height: 1.4;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  background: var(--surface-2);
  color: var(--ink);
  border: 1px solid transparent;
  transition: background 120ms, border-color 120ms;
}
.btn:hover { background: var(--border); }
.btn-primary {
  background: var(--accent);
  color: var(--on-accent);
}
.btn-primary:hover { background: color-mix(in oklab, var(--accent) 88%, #000); }
.btn-primary:disabled {
  background: var(--surface-2);
  color: var(--muted-2);
  cursor: not-allowed;
}
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-ghost { color: var(--ink-2); padding: 8px 14px; border-radius: 7px; }
.btn-ghost:hover { background: var(--surface-2); }

.example-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  margin-top: 16px;
  padding-left: 4px;
}
.example-label {
  font-family: var(--font-latin);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-right: 4px;
}
.example-chip {
  padding: 5px 10px;
  border-radius: 999px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 12.5px;
  color: var(--ink-2);
  transition: border-color 120ms, color 120ms;
}
.example-chip:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* Section */
.section { margin-bottom: 48px; }
.section-tight { margin-bottom: 0; }
.section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.01em;
  margin: 0;
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.section-en {
  font-family: var(--font-latin);
  font-size: 10.5px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 500;
}
.section-meta, .section-link {
  font-size: 12px;
  color: var(--muted);
  font-family: var(--font-latin);
}
.section-link:hover { color: var(--ink); }

/* Category grid */
.category-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.cat-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  text-align: left;
  transition: border-color 120ms, transform 120ms;
}
.cat-card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}
.cat-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--accent-soft);
  color: var(--accent);
  display: grid;
  place-items: center;
}
.cat-text { flex: 1; min-width: 0; }
.cat-zh { font-size: 13.5px; font-weight: 500; color: var(--ink); }
.cat-en {
  font-family: var(--font-latin);
  font-size: 10.5px;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.cat-count {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

/* Recent */
.recent-list {
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.recent-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  text-align: left;
  transition: background 120ms;
}
.recent-row:last-child { border-bottom: none; }
.recent-row:hover { background: var(--surface-2); }
.recent-q {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--ink-1);
  font-size: 13.5px;
  min-width: 0;
}
.recent-q svg { color: var(--muted-2); flex-shrink: 0; }
.recent-meta {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

/* Info card */
.info-card {
  display: flex;
  gap: 14px;
  padding: 16px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 8px;
}
.info-icon { color: var(--accent); padding-top: 2px; }
.info-title { font-weight: 600; font-size: 13.5px; margin-bottom: 4px; }
.info-text { font-size: 13px; color: var(--ink-2); line-height: 1.6; }
.info-text b { color: var(--ink); font-weight: 600; }

/* ============================================================
   Results page
   ============================================================ */

.results-page {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}

.results-topbar {
  border-bottom: 1px solid var(--border);
  padding: 16px var(--pad-x) 0;
  background: var(--bg);
  position: sticky;
  top: 56px;
  z-index: 30;
}

.results-search-row { margin-bottom: 12px; }

.search-box-inline {
  height: 42px;
  border-radius: 8px;
  box-shadow: none;
  padding: 0 14px;
  max-width: 720px;
}
.search-box-static {
  cursor: text;
  transition: border-color 120ms;
}
.search-box-static:hover { border-color: var(--border-2); }
.search-query {
  flex: 1;
  color: var(--ink);
  font-size: 14px;
}
.search-edit-hint {
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-latin);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.search-box-static:hover .search-edit-hint { color: var(--accent); }

/* Param strip */
.param-strip {
  padding: 0 0 14px;
}
.param-strip-head {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 8px;
}
.param-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 11.5px;
  font-weight: 500;
}
.param-tag-en {
  font-family: var(--font-latin);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  opacity: 0.7;
}
.param-confidence {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: auto;
}
.conf-bar {
  display: inline-block;
  width: 56px;
  height: 4px;
  background: var(--surface-2);
  border-radius: 2px;
  overflow: hidden;
}
.conf-bar span {
  display: block;
  height: 100%;
  border-radius: 2px;
  transition: background 300ms, width 300ms;
}
.conf-text { font-size: 10.5px; color: var(--muted); }

.param-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}

.param-sentence {
  font-size: 13.5px;
  color: var(--ink-1);
  padding: 4px 0;
  line-height: 1.7;
}
.param-sentence b {
  color: var(--accent);
  font-weight: 600;
  padding: 1px 6px;
  background: var(--accent-soft);
  border-radius: 4px;
  margin: 0 1px;
}

/* Chips */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 12px;
  background: var(--surface-2);
  color: var(--ink-1);
  border: 1px solid transparent;
  line-height: 1.5;
  vertical-align: middle;
}
.chip-ghost {
  background: transparent;
  border-color: var(--border);
  color: var(--ink-2);
}
.chip-outline {
  background: var(--surface);
  border-color: var(--border);
}
.chip-solid {
  background: var(--accent-soft);
  border-color: color-mix(in oklab, var(--accent) 20%, transparent);
  color: var(--accent);
}
.chip-code {
  background: #FFF;
  border-color: var(--border);
  color: var(--ink-1);
  padding-left: 4px;
}
.chip-icon { display: flex; }
.chip-k {
  font-family: var(--font-mono);
  font-size: 9.5px;
  color: var(--muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-right: 4px;
  padding-right: 6px;
  border-right: 1px solid var(--border);
}
.chip-solid .chip-k { color: color-mix(in oklab, var(--accent) 60%, var(--muted)); border-color: color-mix(in oklab, var(--accent) 18%, transparent); }
.chip-remove {
  display: grid;
  place-items: center;
  width: 14px;
  height: 14px;
  border-radius: 3px;
  font-size: 14px;
  color: inherit;
  opacity: 0.5;
  margin-left: 2px;
}
.chip-remove:hover { background: rgba(0,0,0,0.06); opacity: 1; }
.chip-clickable { cursor: pointer; }
.chip-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-right: 2px;
}
.dot-strict { background: var(--strict); }
.dot-loose { background: var(--loose); }

.chip-add {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 6px;
  border: 1px dashed var(--border-2);
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
}
.chip-add:hover { color: var(--accent); border-color: var(--accent); }

/* Results main split */
.results-main {
  display: grid;
  grid-template-columns: 232px 1fr;
  gap: 32px;
  padding: 20px var(--pad-x) 64px;
  max-width: 1440px;
  margin: 0 auto;
  width: 100%;
  align-items: flex-start;
}

/* Filter side */
.filter-side {
  position: sticky;
  top: 200px;
  display: flex;
  flex-direction: column;
  gap: 22px;
}
.filter-head {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-latin);
  font-size: 10.5px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.filter-group-head {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-1);
  margin-bottom: 4px;
  width: 100%;
  background: none;
  border: none;
  padding: 3px 0;
  cursor: pointer;
  text-align: left;
  border-radius: 4px;
  transition: color 120ms;
}
.filter-group-head:hover { color: var(--ink); }
.filter-collapse-chevron {
  margin-left: auto;
  color: var(--muted);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  transition: transform 150ms;
}
.filter-group-head[aria-expanded="false"] .filter-collapse-chevron {
  transform: rotate(-90deg);
}
.filter-group-en {
  font-family: var(--font-latin);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 500;
}
.filter-rows { display: flex; flex-direction: column; }
.filter-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 5px 8px;
  margin: 0 -8px;
  border-radius: 6px;
  text-align: left;
  color: var(--ink-2);
  font-size: 13px;
}
.filter-row:hover { background: var(--surface-2); color: var(--ink); }
.filter-row-on {
  background: var(--accent-soft);
  color: var(--accent);
  font-weight: 500;
}
.filter-row-on:hover { background: var(--accent-soft); color: var(--accent); }
.filter-row-main {
  display: flex;
  align-items: center;
  gap: 6px;
  min-width: 0;
}
.filter-row-label { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.filter-row-en {
  font-family: var(--font-latin);
  font-size: 9.5px;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.filter-row-on .filter-row-en { color: color-mix(in oklab, var(--accent) 70%, transparent); }
.filter-row-count {
  font-size: 11px;
  color: var(--muted);
  flex-shrink: 0;
}
.filter-row-on .filter-row-count { color: var(--accent); }

/* Results body */
.results-body { min-width: 0; }

.results-stat-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.results-stat {
  font-size: 13px;
  color: var(--ink-1);
}
.results-stat b { font-weight: 600; color: var(--ink); }
.results-stat-sep { color: var(--muted-2); margin: 0 8px; }
.results-stat-muted {
  font-size: 11.5px;
  color: var(--muted);
}

.results-mode-toggle {
  display: inline-flex;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 2px;
  gap: 2px;
}
.mode-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 5px;
  font-size: 12px;
  color: var(--ink-2);
}
.mode-on { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-1); }
.mode-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}
.mode-dot-strict { background: var(--strict); }
.mode-dot-loose { background: var(--loose); }

/* Result grid */
.result-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}
.result-grid-compact {
  grid-template-columns: 1fr;
  gap: 8px;
}

.result-card {
  display: grid;
  grid-template-columns: 100px 1fr;
  gap: 14px;
  padding: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: border-color 120ms, transform 120ms, box-shadow 120ms;
  text-align: left;
}
.result-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow-2);
  transform: translateY(-1px);
}
.result-card-compact {
  grid-template-columns: 64px 1fr;
  gap: 12px;
  padding: 10px 14px;
}

.result-thumb-wrap {
  position: relative;
  aspect-ratio: 4 / 3;
  border-radius: 6px;
  overflow: hidden;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--accent);
}
.result-card-compact .result-thumb-wrap { aspect-ratio: 1; }

.thumb { width: 100%; height: 100%; }
.thumb svg { display: block; }
.thumb-overlay {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 18px;
  height: 18px;
  border-radius: 4px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(4px);
  display: grid;
  place-items: center;
  color: var(--ink-1);
}

.result-body { min-width: 0; display: flex; flex-direction: column; gap: 6px; }
.result-meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 2px;
}
.result-title {
  font-size: 14.5px;
  font-weight: 600;
  margin: 0;
  color: var(--ink);
  line-height: 1.35;
  text-wrap: pretty;
}
.result-title-en {
  font-family: var(--font-latin);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.02em;
}
.result-snippet {
  font-size: 12.5px;
  color: var(--ink-2);
  margin: 4px 0 0;
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.result-foot {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--border);
}

.match-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
}
.match-strict {
  background: color-mix(in oklab, var(--strict) 8%, transparent);
  color: var(--strict);
}
.match-loose {
  background: color-mix(in oklab, var(--loose) 10%, transparent);
  color: var(--loose);
}
.match-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}
.match-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  opacity: 0.75;
  margin-left: 2px;
}

.score-bar-wrap {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.score-bar-track {
  width: 38px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.score-bar-fill {
  height: 100%;
  border-radius: 2px;
}
.score-pct {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--muted);
}

.result-source {
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10.5px;
  color: var(--muted);
}
.result-source svg { color: var(--muted-2); }

mark.hl {
  background: color-mix(in oklab, var(--accent) 18%, transparent);
  color: var(--accent);
  padding: 0 1px;
  border-radius: 2px;
}

/* Disambiguation */
.disambig {
  padding: 16px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 10px;
  margin-bottom: 18px;
}
.disambig-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}
.disambig-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 11px;
  font-weight: 500;
}
.disambig-en {
  font-family: var(--font-latin);
  font-size: 10.5px;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.disambig-body { font-size: 13.5px; color: var(--ink-1); margin-bottom: 12px; }
.disambig-body b { color: var(--accent); font-weight: 600; }
.disambig-options {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.disambig-opt {
  text-align: left;
  padding: 10px 12px;
  border-radius: 7px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  transition: border-color 120ms, background 120ms;
}
.disambig-opt:hover {
  border-color: var(--accent);
  background: var(--surface);
}
.disambig-opt-q { font-size: 13px; color: var(--ink); margin-bottom: 2px; }
.disambig-opt-hint { font-size: 10.5px; color: var(--muted); }

/* Loose notice */
.loose-notice {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: color-mix(in oklab, var(--loose) 6%, var(--surface));
  border: 1px solid color-mix(in oklab, var(--loose) 30%, var(--border));
  border-radius: 8px;
  margin-bottom: 18px;
  color: var(--ink-1);
  font-size: 13px;
}
.loose-notice svg { color: var(--loose); }
.loose-text { flex: 1; }
.loose-text b { color: var(--ink); font-weight: 600; }
.loose-action {
  color: var(--loose);
  font-size: 12.5px;
  font-weight: 500;
}
.loose-action:hover { text-decoration: underline; }

/* Empty */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--muted);
}
.empty-illus { color: var(--muted-2); margin-bottom: 16px; display: flex; justify-content: center; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
.empty-sub { font-size: 13px; max-width: 400px; margin: 0 auto 18px; }

/* ============================================================
   Detail drawer
   ============================================================ */
.drawer-shade {
  position: fixed;
  inset: 0;
  background: rgba(20, 18, 12, 0.32);
  backdrop-filter: blur(2px);
  z-index: 100;
  animation: drawer-fade 200ms ease;
}
@keyframes drawer-fade { from { opacity: 0; } to { opacity: 1; } }

.drawer {
  position: absolute;
  top: 0;
  right: 0;
  height: 100%;
  width: min(640px, 92vw);
  background: var(--bg);
  box-shadow: var(--shadow-3);
  display: flex;
  flex-direction: column;
  animation: drawer-slide 240ms cubic-bezier(0.2, 0.8, 0.2, 1);
}
@keyframes drawer-slide { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.drawer-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 22px;
  border-bottom: 1px solid var(--border);
}
.drawer-crumbs {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-latin);
  font-size: 11.5px;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.crumb-sep { color: var(--muted-2); }

.icon-btn {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: grid;
  place-items: center;
  color: var(--ink-2);
}
.icon-btn:hover { background: var(--surface-2); color: var(--ink); }

.drawer-hero {
  height: 180px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  color: var(--accent);
  flex-shrink: 0;
}
.drawer-hero .thumb svg { height: 100%; }

.drawer-body {
  padding: 24px 28px 48px;
  overflow-y: auto;
}

.drawer-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 14px;
}

.drawer-title {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin: 0 0 4px;
  line-height: 1.3;
}
.drawer-title-en {
  font-family: var(--font-latin);
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.01em;
  margin-bottom: 24px;
}

.drawer-section { margin-top: 24px; }
.drawer-section h4 {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin: 0 0 8px;
}
.drawer-prose {
  font-size: 13.5px;
  line-height: 1.7;
  color: var(--ink-1);
  margin: 0;
  white-space: pre-wrap;
}
.drawer-pre {
  font-family: inherit;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
}
.drawer-section-note .drawer-pre {
  background: color-mix(in oklab, var(--loose) 6%, var(--surface));
  border-color: color-mix(in oklab, var(--loose) 25%, var(--border));
}

.drawer-source {
  margin-top: 32px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
}
.source-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12.5px;
  color: var(--ink-1);
}
.source-row svg { color: var(--muted); }
.source-file { color: var(--ink); }
.source-pages { color: var(--muted); }
.src-btn {
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  border-radius: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 12px;
  color: var(--ink-1);
}
.src-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Tweak note */
.tweak-note {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.5;
  padding: 6px 0 0;
}

/* Loading spinner */
@keyframes kb-spin { to { transform: rotate(360deg); } }
.kb-spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: kb-spin 0.7s linear infinite;
  flex-shrink: 0;
}
.kb-loading {
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; padding: 60px 0; color: var(--muted); font-size: 13px;
}

/* Inline keyword input */
.kw-inline-input {
  display: inline-block; height: 26px; padding: 0 8px;
  border-radius: 6px; border: 1px solid var(--accent);
  background: var(--surface); font-size: 12px; color: var(--ink);
  outline: none; width: 140px;
  box-shadow: 0 0 0 3px var(--accent-soft);
}

/* Copy-filename feedback state */
.src-btn-copied {
  border-color: var(--strict); color: var(--strict);
  background: color-mix(in oklab, var(--strict) 6%, var(--surface));
}
.src-btn-copied:hover { border-color: var(--strict); color: var(--strict); }

/* Library topbar */
.lib-topbar { padding-bottom: 16px; }
.lib-topbar-inner { display: flex; align-items: baseline; gap: 14px; }
.lib-title {
  font-size: 18px; font-weight: 600; margin: 0;
  display: flex; align-items: baseline; gap: 10px;
}
.lib-title-en {
  font-family: var(--font-latin); font-size: 11px; color: var(--muted);
  letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500;
}
.lib-total { font-size: 12px; color: var(--muted); }

/* Admin page */
.admin-page {
  max-width: 860px; margin: 0 auto;
  padding: 32px var(--pad-x) 80px; width: 100%; position: relative;
}
.admin-inner { display: flex; flex-direction: column; gap: 32px; }
.admin-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 22px 24px;
}
.admin-section-head {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 16px;
}
.admin-section-title { font-size: 14px; font-weight: 600; margin: 0; }
.admin-stats-grid { display: flex; gap: 12px; flex-wrap: wrap; }
.admin-stat-card {
  padding: 12px 18px; background: var(--surface-2);
  border: 1px solid var(--border); border-radius: 8px;
  text-align: center; min-width: 80px;
}
.admin-stat-num {
  font-size: 24px; font-weight: 600;
  font-family: var(--font-mono); color: var(--accent);
}
.admin-stat-label { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
.admin-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.admin-type-pills { display: flex; gap: 8px; margin-bottom: 20px; }
.admin-type-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
  font-size: 13px; color: var(--ink-2); background: var(--surface-2);
  transition: border-color 120ms, background 120ms, color 120ms;
}
.admin-type-pill:hover { border-color: var(--accent); color: var(--accent); }
.admin-type-pill-on {
  border-color: var(--accent); background: var(--accent-soft);
  color: var(--accent); font-weight: 500;
}
.admin-form { display: flex; flex-direction: column; gap: 14px; }
.admin-field { display: flex; flex-direction: column; gap: 5px; }
.admin-label { font-size: 12.5px; font-weight: 500; color: var(--ink-1); }
.admin-required { color: var(--danger); margin-left: 3px; }
.admin-input {
  padding: 7px 10px; border: 1px solid var(--border);
  border-radius: 7px; background: var(--surface);
  font-size: 13.5px; color: var(--ink); font-family: inherit;
  outline: none; transition: border-color 120ms, box-shadow 120ms;
}
.admin-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.admin-input-err { border-color: var(--danger); }
.admin-textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
.admin-field-err { font-size: 11px; color: var(--danger); }
.admin-form-foot {
  display: flex; align-items: center;
  justify-content: flex-end; gap: 14px; padding-top: 6px;
}
.admin-success {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12.5px; color: var(--strict);
}
.admin-toast {
  position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
  z-index: 200; display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-radius: 8px; font-size: 13px;
  box-shadow: var(--shadow-3); animation: drawer-fade 180ms ease;
}
.admin-toast-ok {
  background: color-mix(in oklab, var(--strict) 8%, var(--surface));
  border: 1px solid color-mix(in oklab, var(--strict) 30%, var(--border));
  color: var(--strict);
}
.admin-toast-err {
  background: color-mix(in oklab, var(--danger) 8%, var(--surface));
  border: 1px solid color-mix(in oklab, var(--danger) 30%, var(--border));
  color: var(--danger);
}

/* ── Import page ───────────────────────────────────────────────────────── */
.import-page {
  max-width: 960px; margin: 0 auto; padding: 32px var(--pad-x);
}
.import-inner { display: flex; flex-direction: column; gap: 28px; }
.import-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 24px;
}
.import-section-head {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
}
.import-section-title { font-size: 14px; font-weight: 600; margin: 0; }
.import-dropzone {
  border: 2px dashed var(--border-2); border-radius: var(--radius);
  padding: 40px; text-align: center; cursor: pointer;
  transition: border-color 150ms, background 150ms;
  color: var(--muted);
}
.import-dropzone:hover, .import-dropzone.drag-over {
  border-color: var(--accent); background: var(--accent-soft);
  color: var(--accent);
}
.import-dropzone-label { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
.import-dropzone-hint { font-size: 12px; color: var(--muted); }
.import-hints { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
.import-hint-field { flex: 1; min-width: 180px; }
.import-hint-field label { display: block; font-size: 11.5px; font-weight: 500; color: var(--ink-2); margin-bottom: 4px; }
.import-hint-field select, .import-hint-field input {
  width: 100%; padding: 7px 10px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 13px; font-family: inherit;
  background: var(--surface); color: var(--ink);
}
.import-hint-field select:focus, .import-hint-field input:focus {
  outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft);
}
.import-folder-row { display: flex; gap: 10px; margin-top: 12px; align-items: flex-end; }
.import-folder-row input { flex: 1; }
.import-progress { margin-top: 12px; }
.import-progress-bar {
  height: 6px; border-radius: 3px; background: var(--surface-2); overflow: hidden; position: relative;
}
.import-progress-fill {
  height: 100%; border-radius: 3px; background: var(--accent);
  transition: width 300ms ease;
}
@keyframes progress-shimmer {
  0%   { transform: translateX(-200%); }
  100% { transform: translateX(400%); }
}
.import-progress-bar.indeterminate .import-progress-fill {
  width: 30% !important;
  background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
  animation: progress-shimmer 1.4s ease-in-out infinite;
  transition: none;
}
.import-progress-row {
  display: flex; align-items: center; gap: 10px; margin-top: 5px;
}
.import-progress-text { font-size: 11.5px; color: var(--muted); }
.import-progress-elapsed { font-size: 11px; color: var(--muted-2); margin-left: auto; }
.import-step-msg {
  font-size: 11.5px; color: var(--accent); margin-top: 6px;
  display: flex; align-items: center; gap: 6px; min-height: 18px;
}
.import-file-list { list-style: none; padding: 0; margin: 12px 0 0; display: flex; flex-direction: column; gap: 6px; }
.import-file-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: var(--radius-sm);
  background: var(--surface-2); font-size: 12.5px;
}
.import-file-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.import-file-step { font-size: 11px; color: var(--accent); font-style: italic; flex-shrink: 0; }
.import-file-status { font-size: 11px; margin-left: auto; flex-shrink: 0; }
.import-file-status.ok { color: var(--strict); }
.import-file-status.skip { color: var(--loose); }
.import-file-status.err { color: var(--danger); }
.import-doc-cards { display: flex; flex-direction: column; gap: 14px; }
.import-doc-card {
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface); overflow: hidden;
}
.import-doc-card.rejected { opacity: 0.5; }
.import-doc-head {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  background: var(--surface-2); cursor: pointer; user-select: none;
}
.import-doc-head:hover { background: color-mix(in oklab, var(--accent) 5%, var(--surface-2)); }
.import-doc-title { font-size: 13px; font-weight: 500; flex: 1; }
.import-doc-conf { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
.import-doc-conf.high { background: color-mix(in oklab, var(--strict) 12%, var(--surface)); color: var(--strict); }
.import-doc-conf.med { background: color-mix(in oklab, var(--loose) 12%, var(--surface)); color: var(--loose); }
.import-doc-conf.low { background: color-mix(in oklab, var(--danger) 12%, var(--surface)); color: var(--danger); }
.import-doc-body { padding: 14px; display: flex; flex-direction: column; gap: 12px; }
.import-doc-field { display: flex; flex-direction: column; gap: 4px; }
.import-doc-field label { font-size: 11.5px; font-weight: 500; color: var(--ink-2); }
.import-doc-field input, .import-doc-field textarea, .import-doc-field select {
  padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; font-family: inherit; background: var(--surface); color: var(--ink);
}
.import-doc-field textarea { resize: vertical; min-height: 60px; line-height: 1.5; }
.import-doc-field input:focus, .import-doc-field textarea:focus, .import-doc-field select:focus {
  outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft);
}
.import-doc-raw { margin-top: 8px; }
.import-doc-raw summary { font-size: 11.5px; color: var(--muted); cursor: pointer; }
.import-doc-raw pre {
  margin: 6px 0 0; padding: 10px; background: var(--surface-2);
  border-radius: var(--radius-sm); font-size: 11.5px; white-space: pre-wrap;
  word-break: break-all; max-height: 200px; overflow-y: auto;
  font-family: var(--font-mono); color: var(--ink-2);
}
.import-warnings { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.import-warning-badge {
  font-size: 10.5px; padding: 1px 6px; border-radius: 8px;
  background: color-mix(in oklab, var(--loose) 15%, var(--surface));
  color: var(--loose);
}
.import-bulk-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.import-commit-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0 0; border-top: 1px solid var(--border); margin-top: 8px;
}
.import-commit-summary { font-size: 12.5px; color: var(--ink-2); }
.import-result { text-align: center; padding: 24px; }
.import-result-num { font-size: 32px; font-weight: 700; color: var(--accent); }
.import-result-label { font-size: 13px; color: var(--muted); margin-top: 4px; }
.import-toast {
  position: fixed; top: 80px; right: 24px; z-index: 2000;
  padding: 10px 18px; border-radius: var(--radius);
  font-size: 13px; display: flex; align-items: center; gap: 8px;
  box-shadow: var(--shadow-2); animation: slideInRight 200ms ease;
}
.import-toast-ok {
  background: color-mix(in oklab, var(--strict) 8%, var(--surface));
  border: 1px solid color-mix(in oklab, var(--strict) 30%, var(--border));
  color: var(--strict);
}
.import-toast-err {
  background: color-mix(in oklab, var(--danger) 8%, var(--surface));
  border: 1px solid color-mix(in oklab, var(--danger) 30%, var(--border));
  color: var(--danger);
}
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

/* Library filter: smaller sticky top (topbar is shorter than Results) */
.lib-filter-side { top: 120px; }

/* ── AI Chat ────────────────────────────────────────────────────────────── */
.chat-fab {
  position: fixed; right: 24px; bottom: 24px; z-index: 900;
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--accent); color: var(--on-accent);
  display: grid; place-items: center;
  box-shadow: var(--shadow-3); border: none; cursor: pointer;
  transition: transform 120ms, box-shadow 120ms;
}
.chat-fab:hover { transform: translateY(-2px); box-shadow: 0 20px 60px -16px rgba(20,18,12,.35), 0 2px 6px -2px rgba(20,18,12,.1); }

.chat-panel {
  position: fixed; right: 24px; bottom: 84px; z-index: 899;
  width: 360px; height: 480px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; box-shadow: var(--shadow-3);
  display: flex; flex-direction: column; overflow: hidden;
  animation: drawer-fade 180ms ease;
}
.chat-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  background: var(--bg); flex-shrink: 0;
}
.chat-head-title {
  display: flex; align-items: center; gap: 7px;
  font-size: 13px; font-weight: 600; color: var(--ink);
}
.chat-head-title svg { color: var(--accent); }
.chat-messages {
  flex: 1; overflow-y: auto; padding: 12px 14px;
  display: flex; flex-direction: column; gap: 10px;
  scrollbar-width: thin; scrollbar-color: var(--border-2) transparent;
}
.chat-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px; text-align: center; color: var(--muted); padding: 20px;
}
.chat-empty svg { color: var(--accent); margin-bottom: 4px; }
.chat-empty p { margin: 0; font-size: 12.5px; line-height: 1.6; }
.chat-msg { max-width: 88%; font-size: 13px; line-height: 1.55; }
.chat-msg-user { align-self: flex-end; }
.chat-msg-assistant { align-self: flex-start; }
.chat-msg-content {
  padding: 8px 11px; border-radius: 10px;
  white-space: pre-wrap; word-break: break-word;
}
.chat-msg-content.chat-md { white-space: normal; }
.chat-msg-user .chat-msg-content {
  background: var(--accent); color: var(--on-accent);
  border-bottom-right-radius: 3px;
}
.chat-msg-assistant .chat-msg-content {
  background: var(--surface-2); color: var(--ink-1);
  border-bottom-left-radius: 3px; border: 1px solid var(--border);
}
.chat-loading { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
.chat-loading span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted); animation: chat-dot 1.2s infinite;
}
.chat-loading span:nth-child(2) { animation-delay: .2s; }
.chat-loading span:nth-child(3) { animation-delay: .4s; }
@keyframes chat-dot {
  0%, 60%, 100% { opacity: .3; transform: translateY(0); }
  30% { opacity: 1; transform: translateY(-3px); }
}
.chat-input-area {
  flex-shrink: 0; border-top: 1px solid var(--border); background: var(--bg);
}
.chat-quickshots {
  display: flex; gap: 5px; flex-wrap: wrap;
  padding: 7px 12px 0; border-top: 1px solid var(--border);
}
.chat-quickshot-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 8px; border-radius: 12px; font-size: 11.5px;
  background: var(--surface-2); border: 1px solid var(--border);
  color: var(--ink-2); cursor: pointer; white-space: nowrap; max-width: 220px; overflow: hidden; text-overflow: ellipsis;
  transition: border-color 100ms, color 100ms;
}
.chat-quickshot-chip:hover { border-color: var(--accent); color: var(--accent); }
.chat-input-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px;
}
.chat-hint-btn {
  width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0;
  display: grid; place-items: center; color: var(--muted);
  border: 1px solid transparent; transition: background 100ms, color 100ms;
}
.chat-hint-btn:hover, .chat-hint-btn.active { background: var(--surface-2); color: var(--accent); border-color: var(--border); }
.chat-input {
  flex: 1; height: 34px; padding: 0 10px;
  border: 1px solid var(--border); border-radius: 7px;
  background: var(--surface); font-size: 13px; color: var(--ink);
  outline: none; transition: border-color 120ms; font-family: inherit;
}
.chat-input:focus { border-color: var(--accent); }
.chat-input:disabled { background: var(--surface-2); }

/* Chat resize handle */
.chat-resize-handle {
  position: absolute; top: 0; left: 0; width: 28px; height: 28px;
  cursor: nw-resize; z-index: 10; opacity: 0.35; transition: opacity 150ms;
}
.chat-resize-handle::before {
  content: ''; position: absolute; top: 6px; left: 6px;
  width: 12px; height: 12px;
  border-top: 2px solid var(--border-2); border-left: 2px solid var(--border-2);
  border-radius: 3px 0 0 0;
}
.chat-resize-handle::after {
  content: ''; position: absolute; top: 10px; left: 10px;
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--border-2);
}
.chat-panel:hover .chat-resize-handle { opacity: 1; }

/* Chat suggestion chips */
.chat-suggestions {
  padding: 0 14px 10px; display: flex; flex-direction: column; gap: 5px;
}
.chat-suggestions-label {
  font-size: 10.5px; color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.05em; margin-bottom: 2px;
}
.chat-suggestion-chip {
  display: flex; align-items: flex-start; gap: 7px;
  padding: 6px 10px; border-radius: 7px;
  background: var(--surface-2); border: 1px solid var(--border);
  text-align: left; font-size: 12.5px; color: var(--ink-1);
  transition: border-color 120ms, background 120ms; cursor: pointer;
  line-height: 1.45;
}
.chat-suggestion-chip:hover { border-color: var(--accent); background: var(--surface); color: var(--accent); }
.chat-suggestion-chip svg { flex-shrink: 0; margin-top: 1px; color: var(--muted); }
.chat-suggestion-chip:hover svg { color: var(--accent); }

/* Markdown rendered inside assistant messages */
.chat-md { line-height: 1.5; }
.chat-md p { margin: 0 0 2px; }
.chat-md p:last-child { margin-bottom: 0; }
.chat-md br { display: none; }
.chat-md h1,.chat-md h2,.chat-md h3 { font-size: 13px; font-weight: 600; margin: 6px 0 3px; color: var(--ink); }
.chat-md h1:first-child,.chat-md h2:first-child,.chat-md h3:first-child { margin-top: 0; }
.chat-md ul,.chat-md ol { margin: 3px 0 4px 16px; padding: 0; }
.chat-md li { margin-bottom: 2px; }
.chat-md code { font-family: var(--font-mono); font-size: 11.5px; background: var(--surface-2); padding: 1px 4px; border-radius: 3px; }
.chat-md pre { background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; overflow-x: auto; margin: 6px 0; }
.chat-md pre code { background: none; padding: 0; }
.chat-md strong { font-weight: 600; color: var(--ink); }
.chat-md a { color: var(--accent); text-decoration: underline; }
.chat-md hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

/* Conversational-search mode additions */
.chat-mode-toggle { display: inline-flex; gap: 2px; background: var(--surface-2); border-radius: 6px; padding: 2px; margin-left: auto; margin-right: 6px; }
.chat-mode-btn { border: none; background: transparent; padding: 3px 9px; font-size: 11px; border-radius: 4px; cursor: pointer; color: var(--muted); }
.chat-mode-btn.active { background: var(--surface); color: var(--accent); font-weight: 600; }
.chat-params-bar { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; padding: 6px 12px; font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--surface-2); }
.chat-params-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; color: var(--ink-2); }
.chat-params-reset { margin-left: auto; border: none; background: transparent; color: var(--muted); font-size: 11px; cursor: pointer; padding: 2px 4px; }
.chat-params-reset:hover { color: var(--accent); }
.chat-result-banner { font-size: 11px; color: var(--ink-2); margin-bottom: 6px; padding: 4px 8px; background: var(--surface-2); border-radius: 4px; }
.chat-result-banner.partial { background: oklch(0.95 0.05 70); color: #7a5a10; }
.chat-result-card { border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; margin-top: 6px; cursor: pointer; background: var(--surface); transition: border-color .15s; }
.chat-result-card:hover { border-color: var(--accent); }
.chat-result-title { font-size: 12.5px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
.chat-result-meta { font-size: 11px; color: var(--muted); display: flex; gap: 4px; flex-wrap: wrap; }

/* ── Chat Home (primary interface) ──────────────────────────────────────────── */
.chat-home-wrap {
  flex: 1; display: flex; flex-direction: column;
}
.chat-home-body {
  flex: 1; display: grid;
  grid-template-columns: 1fr 380px;
  align-items: start;
}
@media (max-width: 900px) {
  .chat-home-body { grid-template-columns: 1fr; }
  .chat-home-side { display: none; }
  .chat-home-messages { padding: 20px 18px 8px; }
  .chat-home-footer { padding: 12px 18px 18px; }
}
.chat-home-chat {
  display: flex; flex-direction: column;
  min-height: calc(100vh - 56px);
  border-right: 1px solid var(--border);
}
.chat-home-messages {
  flex: 1; overflow-y: auto; padding: 28px 36px 12px;
  display: flex; flex-direction: column; gap: 18px;
  scrollbar-width: thin; scrollbar-color: var(--border-2) transparent;
}
.chat-home-welcome {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; padding: 48px 24px; text-align: center; gap: 14px;
}
.chat-home-welcome-icon {
  width: 52px; height: 52px; border-radius: 16px;
  background: var(--accent-soft); color: var(--accent);
  display: grid; place-items: center; margin-bottom: 6px;
}
.chat-home-welcome h2 { font-size: 24px; font-weight: 600; margin: 0; letter-spacing: -.015em; }
.chat-home-welcome p { margin: 0; font-size: 13.5px; color: var(--muted); max-width: 480px; line-height: 1.65; }
.chat-home-starters {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
  max-width: 560px; width: 100%; margin-top: 10px;
}
.chat-home-starter {
  text-align: left; padding: 11px 15px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  font-size: 13px; color: var(--ink-1); line-height: 1.4;
  transition: border-color 120ms, background 120ms, color 120ms; cursor: pointer;
}
.chat-home-starter:hover { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
/* message bubbles */
.ch-msg { display: flex; gap: 10px; align-items: flex-start; }
.ch-msg-user { flex-direction: row-reverse; }
.ch-bubble {
  max-width: 68%; padding: 10px 14px; border-radius: 14px;
  font-size: 13.5px; line-height: 1.55;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--ink-1); border-bottom-left-radius: 4px;
  white-space: pre-wrap; word-break: break-word;
}
.ch-msg-user .ch-bubble {
  background: var(--accent); color: var(--on-accent);
  border: none; border-bottom-right-radius: 4px; border-bottom-left-radius: 14px;
}
.ch-bubble.ch-md { white-space: normal; }
.ch-bubble.ch-md p { margin: 0 0 4px; }
.ch-bubble.ch-md p:last-child { margin-bottom: 0; }
.ch-bubble.ch-md ul, .ch-bubble.ch-md ol { margin: 4px 0 4px 18px; }
.ch-bubble.ch-md strong { font-weight: 600; }
.ch-bubble.ch-md code { font-family: var(--font-mono); font-size: 11.5px; background: var(--surface-2); padding: 1px 4px; border-radius: 3px; }
.ch-results-wrap { display: flex; flex-direction: column; gap: 8px; max-width: 86%; }
.ch-results-banner {
  font-size: 11.5px; color: var(--ink-2); padding: 5px 10px;
  background: color-mix(in oklab, var(--strict) 7%, var(--surface));
  border: 1px solid color-mix(in oklab, var(--strict) 25%, var(--border));
  border-radius: 6px; color: var(--strict);
}
.ch-results-banner.partial {
  background: oklch(0.95 0.05 70); color: #7a5a10;
  border-color: oklch(0.88 0.08 70);
}
.ch-result-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; cursor: pointer;
  transition: border-color .12s, transform .12s, box-shadow .12s;
}
.ch-result-card:hover { border-color: var(--accent); box-shadow: var(--shadow-2); transform: translateY(-1px); }
.ch-result-title { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 5px; }
.ch-result-meta { font-size: 11.5px; color: var(--muted); display: flex; gap: 6px; flex-wrap: wrap; }
.ch-result-summary { font-size: 11.5px; color: var(--muted); margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ch-avatar {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0; margin-top: 2px;
  background: var(--accent-soft); color: var(--accent); display: grid; place-items: center;
}
.ch-dots { display: flex; gap: 4px; align-items: center; }
.ch-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted-2); animation: chat-dot 1.2s infinite; }
.ch-dots span:nth-child(2) { animation-delay: .2s; }
.ch-dots span:nth-child(3) { animation-delay: .4s; }
/* footer / input */
.chat-home-footer {
  flex-shrink: 0; padding: 14px 36px 22px;
  border-top: 1px solid var(--border); background: var(--bg);
  /* anchored to the viewport bottom so the input is always reachable
     even when the chat content scrolls past it */
  position: sticky;
  bottom: 0;
  z-index: 5;
}
.chat-home-params-bar {
  display: flex; gap: 5px; flex-wrap: wrap; align-items: center;
  padding-bottom: 10px; font-size: 11.5px; color: var(--muted);
}
.chat-home-params-chip {
  background: var(--accent-soft); color: var(--accent); font-size: 11.5px;
  border: 1px solid color-mix(in oklab, var(--accent) 20%, transparent);
  border-radius: 5px; padding: 1px 8px;
}
.chat-home-input-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 12px 14px;
  box-shadow: var(--shadow-2); transition: border-color 120ms, box-shadow 120ms;
}
.chat-home-input-row:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-soft), var(--shadow-2);
}
.chat-home-textarea {
  flex: 1; border: none; outline: none; background: none;
  font-size: 14.5px; color: var(--ink); resize: none;
  min-height: 22px; max-height: 160px; line-height: 1.5;
  font-family: inherit; overflow-y: auto;
}
.chat-home-textarea::placeholder { color: var(--muted-2); }
.chat-home-send-btn {
  width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;
  display: grid; place-items: center;
  background: var(--accent); color: var(--on-accent);
  transition: opacity 120ms, transform 120ms;
}
.chat-home-send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.chat-home-send-btn:not(:disabled):hover { transform: translateY(-1px); }
.chat-home-hint {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 9px; font-size: 11.5px; color: var(--muted);
  font-family: var(--font-latin);
}
.chat-home-switch-btn {
  color: var(--accent); background: none; border: none;
  font-size: 11.5px; cursor: pointer; font-family: inherit;
}
.chat-home-switch-btn:hover { text-decoration: underline; }
/* right: live results side panel */
.chat-home-side {
  display: flex; flex-direction: column;
  background: var(--bg);
  /* anchored to the viewport: stays pinned at the top of the window
     (just below the 56px sticky header) regardless of page scroll */
  position: sticky;
  top: 56px;
  height: calc(100vh - 56px);
  align-self: start;
  overflow: hidden;
}
.chs-params-sticky {
  flex-shrink: 0;
  background: var(--bg);
  padding: 24px 20px 14px;
  border-bottom: 1px solid var(--border);
}
.chs-results-scroll {
  flex: 1; min-height: 0; overflow-y: auto;
  padding: 14px 20px 40px;
  scrollbar-width: thin; scrollbar-color: var(--border-2) transparent;
}
.chs-empty-wrap {
  flex: 1; min-height: 0; overflow-y: auto;
  padding: 0 20px 40px;
}
.chs-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  gap: 10px; padding: 40px 12px; color: var(--muted);
}
.chs-empty-illus { color: var(--muted-2); margin-bottom: 4px; }
.chs-section-label {
  font-size: 10.5px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
}
.chs-params-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 22px; }
.chs-param-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
.chs-param-label { color: var(--muted); min-width: 46px; font-size: 11.5px; }
.chs-param-value {
  padding: 2px 8px; border-radius: 5px;
  background: var(--accent-soft); color: var(--accent); font-size: 12px; font-weight: 500;
}
.chs-result-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; margin-bottom: 10px; cursor: pointer; transition: border-color .12s;
}
.chs-result-card:hover { border-color: var(--accent); }
.chs-result-title { font-size: 13.5px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.chs-result-meta { font-size: 11px; color: var(--muted); display: flex; gap: 5px; flex-wrap: wrap; }
.chs-result-summary { font-size: 11px; color: var(--muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chs-switch-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 9px 14px; margin-top: 4px; border-radius: 8px;
  background: var(--surface); border: 1px solid var(--border); font-size: 12.5px; color: var(--ink-2);
  cursor: pointer; transition: border-color 120ms, color 120ms;
}
.chs-switch-btn:hover { border-color: var(--accent); color: var(--accent); }
/* Secondary search tab label in header */
.nav-secondary { font-size: 10.5px; color: var(--muted); margin-left: 3px; letter-spacing: .03em; }

/* ── History panel ──────────────────────────────────────────────────────── */
.history-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(20, 18, 12, 0.28); backdrop-filter: blur(2px);
  animation: drawer-fade 180ms ease;
}
.history-panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;
  max-height: 55vh; background: var(--surface);
  border-top: 1px solid var(--border); border-radius: 16px 16px 0 0;
  box-shadow: var(--shadow-3); display: flex; flex-direction: column;
  animation: history-slide 240ms cubic-bezier(0.2, 0.8, 0.2, 1);
}
@keyframes history-slide {
  from { transform: translateY(100%); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.history-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}

<script type="text/babel">
// API client — replaces the old hardcoded semicon/cnc data.
// All data is fetched from the FastAPI backend which talks to Elasticsearch.

const TYPE_DEFS = {
  alarm:      { zh: "机台报警",  en: "Machine alarm",    icon: "alarm"  },
  setup:      { zh: "设备 Setup", en: "Equipment setup", icon: "wrench" },
  experience: { zh: "设备经验",  en: "Field experience", icon: "book"   },
};

// Fallback taxonomy (mirrors config/taxonomy.yaml) used when the API is unreachable.
const FALLBACK_TAXONOMY = {
  version: "fallback",
  knowledge_types: ["alarm", "setup", "experience"],
  projects: ["Kinneret", "MEM", "MHK", "PDX", "Boston", "Sonora", "Yucatan", "所有项目"],
  equipment: ["Aligner", "Conveyor", "FTU", "Heater", "Loader", "Pump", "SensorModule", "Stage"],
};
const FALLBACK_STATS = { total: 0, by_type: {}, by_project: {}, by_equipment: {} };

// ── Recent searches (localStorage-backed) ───────────────────────────────────
const RECENT_KEY = 'kb.recentSearches';
const MAX_RECENT = 10;

function saveRecentSearch(q, project, equipment) {
  try {
    const existing = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
    const entry = { q, project: project || null, machine: equipment || null, ts: Date.now() };
    const updated = [entry, ...existing.filter(r => r.q !== q)].slice(0, MAX_RECENT);
    localStorage.setItem(RECENT_KEY, JSON.stringify(updated));
  } catch (e) {}
}

function getRecentSearches() {
  try { return JSON.parse(localStorage.getItem(RECENT_KEY) || '[]'); }
  catch (e) { return []; }
}

// Shared state loaded at startup.
window.KB_TAXONOMY = null;  // {version, knowledge_types, projects, equipment}
window.KB_STATS    = null;  // {total, by_type, by_project, by_equipment}

async function loadKBData() {
  try {
    const [tax, stats] = await Promise.all([
      fetch('/api/v1/facets').then(r => r.json()),
      fetch('/api/v1/documents/stats').then(r => r.json()),
    ]);
    window.KB_TAXONOMY = tax;
    window.KB_STATS    = stats;
    return { tax, stats };
  } catch (e) {
    console.warn('KB_LOAD failed — using fallback taxonomy:', e);
    window.KB_TAXONOMY = FALLBACK_TAXONOMY;
    window.KB_STATS    = FALLBACK_STATS;
    return { tax: FALLBACK_TAXONOMY, stats: FALLBACK_STATS };
  }
}

function thumbForType(kt) {
  switch (kt) {
    case 'alarm':      return 'circuit';
    case 'setup':      return 'grid';
    case 'experience': return 'wave';
    default:           return 'lines';
  }
}

function hitToDoc(hit, keywords) {
  const sec = hit.sections || {};
  return {
    doc: {
      id:        hit.id,
      type:      hit.knowledge_type,
      project:   hit.project,
      equipment: hit.equipment,
      codes:     hit.error_codes || [],
      title:     hit.title,
      body:      sec.content || sec.body || '',
      procedure: sec.resolution || sec.procedure || '',
      notes:     sec.notes || '',
      sections:  sec,
      source: {
        file:  hit.source_file || '—',
        pages: (hit.source_pages || []).join(', '),
      },
      thumb: thumbForType(hit.knowledge_type),
      summary: hit.summary || null,
    },
    score: Math.round(hit.score * 100) / 100,
    hits: (keywords || []).filter(k => {
      const hay = (hit.title + ' ' + (sec.content || sec.body || '') + ' ' + (sec.resolution || sec.procedure || '')).toLowerCase();
      return hay.includes(k.toLowerCase());
    }),
    strictPass: true,
    loosePass:  true,
  };
}

async function kbSearch(params, mode, from_offset) {
  // Sentence/question queries bypass strict AND-search to avoid the "too many" disambiguation.
  // Use loose (kNN + keyword-OR) so the semantic component handles the intent.
  const effectiveMode = (params.isSentence && (mode === 'auto' || !mode)) ? 'loose' : (mode || 'auto');
  const body = {
    knowledge_type: params.type   || null,
    project:        params.project || null,
    equipment:      params.equipment || null,
    error_codes:    params.code ? [params.code] : [],
    keywords:       params.keywords || [],
    query_text:     params.raw || null,
    mode:           effectiveMode,
    size:           20,
    from_:          from_offset || 0,
  };
  const resp = await fetch('/api/v1/search', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!resp.ok) throw new Error(`Search failed: ${resp.status}`);
  const data = await resp.json();
  const kw = params.keywords || [];
  return {
    status:          data.status,
    total:           data.total,
    hits:            (data.hits || []).map(h => hitToDoc(h, kw)),
    effective_params: data.effective_params,
    facets:          data.facets || {},
    banner:          data.banner || null,
  };
}

window.KB_SEARCH            = kbSearch;
window.KB_LOAD              = loadKBData;
window.KB_TYPE_DEFS         = TYPE_DEFS;
window.KB_FALLBACK_TAXONOMY = FALLBACK_TAXONOMY;
window.KB_FALLBACK_STATS    = FALLBACK_STATS;
window.saveRecentSearch     = saveRecentSearch;
window.getRecentSearches    = getRecentSearches;

// Legacy stubs
window.KB_DATA     = {};
window.KB_RETRIEVE = () => [];

</script>

// --- Thumbnails: subtle SVG placeholders, used as the "preview image" on result cards

}

// --- Generic chrome ---

function Chip({ children, tone = "neutral", icon, dot, onClick, removable, onRemove, active, title }) {
  return (
    <span
      className={`chip chip-${tone} ${active ? "chip-active" : ""} ${onClick ? "chip-clickable" : ""}`}
      onClick={onClick}
      title={title}
    >
      {dot ? <span className={`chip-dot dot-${dot}`} /> : null}
      {icon ? <span className="chip-icon">{icon}</span> : null}
      <span>{children}</span>
      {removable ? (
        <button
          className="chip-remove"
          onClick={(e) => {
            e.stopPropagation();
            onRemove && onRemove();
          }}
          aria-label="remove"
        >
          ×
        </button>
      ) : null}
    </span>
  );
}

function Kbd({ children }) {
  return <span className="kbd">{children}</span>;
}

function Score({ score, maxScore, mode }) {
  const raw = score || 0;
  const max = (maxScore > 0) ? maxScore : (raw > 0 ? raw : 1);
  const pct = Math.min(Math.round((raw / max) * 100), 100);
  // loose/vector results are partial matches at best — cap bar colour at orange
  // so green is only ever seen on strict (high-confidence) hits.
  const isPartial = mode === 'loose' || mode === 'vector';
  const color = isPartial
    ? (pct >= 50 ? 'var(--loose)' : 'var(--muted-2)')
    : (pct >= 70 ? 'var(--strict)' : pct >= 40 ? 'var(--loose)' : 'var(--muted-2)');
  const modeLabel = mode === 'loose' ? '宽松匹配 Loose' : mode === 'vector' ? '语义匹配 Vector' : '严格匹配 Strict';
  const tier = isPartial
    ? (pct >= 50 ? '较高相关 · High-ish' : '低相关 · Low')
    : (pct >= 70 ? '高度相关 · High' : pct >= 40 ? '部分相关 · Partial' : '低相关 · Low');
  const tooltipLines = [
    `相关度 ${pct}%  [${modeLabel}]`,
    ``,
    `计算公式 · Formula:`,
    `  round(doc_score / max_score × 100)`,
    `  doc_score  = ${raw.toFixed(3)}`,
    `  max_score  = ${max.toFixed(3)}`,
    ``,
    isPartial
      ? `颜色上限橙色：宽松/语义结果置信度低于严格匹配，绿色保留给严格命中`
      : `颜色 · Color:  ≥70% 绿色(高)  ≥40% 橙色(中)  <40% 灰色(低)`,
    `等级 · Tier: ${tier}`,
  ];
  return (
    <span className="score-bar-wrap" title={tooltipLines.join('\n')}>
      <span className="score-bar-track">
        <span className="score-bar-fill" style={{ width: `${pct}%`, background: color }} />
      </span>
      <span className="score-pct" style={{ color }}>{pct}%</span>
    </span>
  );
}

function MatchBadge({ mode, hits, total }) {
  if (mode === "strict") {
    return (
      <span className="match-badge match-strict" title="严格匹配：所有关键词均命中，所有筛选条件已满足 · All keywords matched, all filters satisfied">
        <span className="match-dot" />
        <span>严格匹配 · Strict</span>
      </span>
    );
  }
  return (
    <span className="match-badge match-loose" title={`宽松匹配（仅供参考）：在文档中找到 ${total} 个搜索关键词中的 ${hits} 个 · Loose match: ${hits} of ${total} keywords found in this document — partial match, for reference only`}>
      <span className="match-dot" />
      <span>
        宽松匹配 · Loose <span className="match-meta">{hits}/{total} 词</span>
      </span>
    </span>
  );
}

// Highlight matching keywords inside text.
function highlight(text, keywords) {
  if (!text || !keywords || keywords.length === 0) return text;
  const escaped = keywords.filter(Boolean).map((k) => k.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
  if (!escaped.length) return text;
  const re = new RegExp("(" + escaped.join("|") + ")", "gi");
  const parts = text.split(re);
  return parts.map((p, i) =>
    re.test(p) ? <mark key={i} className="hl">{p}</mark> : <span key={i}>{p}</span>
  );
}
