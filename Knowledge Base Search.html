            placeholder="例如：FTU 125002 穿梭真空报警怎么处理？"
          />
          <div className="search-actions">
            <span className="search-hint">
              <Kbd>Enter</Kbd> 提问 · <Kbd>↑↓</Kbd> 切例
            </span>
            <button type="submit" className="btn btn-primary" disabled={!q.trim()}>
              <span>检索</span>
              <Icon name="arrow-right" size={14} />
            </button>
          </div>
        </form>

        <div className="example-row">
          <span className="example-label">试试 · Try</span>
          {examples.map((ex, i) => (
            <button key={i} className="example-chip" onClick={() => onSubmit(ex)}>{ex}</button>
          ))}
        </div>
      </div>

      <section className="section">
        <div className="section-head">
          <h2 className="section-title">
            <span>知识分类</span>
            <span className="section-en">Categories</span>
          </h2>
          <span className="section-meta">{total} 篇文档 · {kts.length} 类</span>
        </div>
        <div className="category-grid">
          {kts.map((kt) => {
            const def   = typeDefs[kt] || {};
            const count = stats?.by_type?.[kt] || 0;
            return (
              <button key={kt} className="cat-card" onClick={() => onPickType(kt)}>
                <div className="cat-icon">
                  <Icon name={typeIconMap[kt] || "doc"} size={18} />
                </div>
                <div className="cat-text">
                  <div className="cat-zh">{def.zh || kt}</div>
                  <div className="cat-en">{def.en || kt}</div>
                </div>
                <div className="cat-count">{count}</div>
              </button>
            );
          })}
        </div>
      </section>

      {recent.length > 0 && (
        <section className="section">
          <div className="section-head">
            <h2 className="section-title">
              <span>最近检索</span>
              <span className="section-en">Recent</span>
            </h2>
            <button className="section-link" onClick={() => {
              try { localStorage.removeItem(window.RECENT_KEY || 'kb.recentSearches'); } catch(e) {}
              setRecent([]);
            }}>清除 · Clear</button>
          </div>
          <div className="recent-list">
            {recent.map((r, i) => (
              <button key={i} className="recent-row" onClick={() => onPickRecent(r)}>
                <div className="recent-q">
                  <Icon name="clock" size={13} />
                  <span>{r.q}</span>
                </div>
                <div className="recent-meta">
                  {r.project && <Chip tone="ghost">{r.project}</Chip>}
                  {r.machine && <Chip tone="ghost">{r.machine}</Chip>}
                </div>
              </button>
            ))}
          </div>
        </section>
      )}

      <section className="section section-tight">
        <div className="info-card">
          <div className="info-icon"><Icon name="info" size={16} /></div>
          <div className="info-body">
            <div className="info-title">为什么不直接让 AI 回答？</div>
            <div className="info-text">
              制造业知识库的内容（设备、报警代码、参数）几乎不与通识相关。本系统采用 <b>两阶段检索</b>：
              先用关键词精确召回候选文档，再用 <b>BM25 + 向量相似度</b> 混合排序；
              结果保证 100% 来自原文档，不进行 AI 组合发挥。
            </div>
          </div>
        </div>
      </section>
    </div>
  );
}

window.Landing = Landing;

</script>
<script type="text/babel">
// Results view: param-extraction strip + filter chips + grid + disambiguation + detail drawer.

const { useState: rsUse, useEffect: rsEff, useMemo: rsMemo } = React;

// --- Shared: compute query-extraction confidence from a params object
function computeConf(p) {
  let c = 0.25;
  if (p.project)   c += 0.15;
  if (p.equipment) c += 0.15;
  if (p.code)      c += 0.20;
  if (p.type)      c += 0.10;
  if (p.keywords && p.keywords.length > 0)
    c += Math.min(0.15, p.keywords.length * 0.05);
  return Math.min(0.98, c);
}

// Mini confidence badge — bar + coloured percentage + hover tooltip with formula.
function ConfBadge({ params, size }) {
  const score  = computeConf(params);
  const pct    = Math.round(score * 100);
  const color  = pct >= 70 ? 'var(--strict)' : pct >= 40 ? 'var(--loose)' : 'var(--muted-2)';
  const barW   = size === 'mini' ? 28 : 56;
  const barH   = size === 'mini' ? 3  : 4;
  const sufficient = !!(params.project || params.equipment || params.code || params.type)
                     || (params.keywords && params.keywords.length >= 2);
  const tip = [
    `查询解析置信度 ${pct}% · Query Extraction Confidence`,
    ``,
    `计算公式 · Formula:`,
    `  基础分 Base                   +25%`,
    `  项目字段 Project    ${params.project   ? `✓ +15%` : `✗  +0%`}`,
    `  机台字段 Equipment  ${params.equipment ? `✓ +15%` : `✗  +0%`}`,
    `  错误代码 Error Code ${params.code      ? `✓ +20%` : `✗  +0%`}`,
    `  类型字段 Type       ${params.type      ? `✓ +10%` : `✗  +0%`}`,
    `  关键词 Keywords (×5%, max 15%) ${params.keywords?.length ? `✓ +${Math.min(15, params.keywords.length * 5)}%` : `✗  +0%`}`,
    `  上限 Cap: 98%`,
    ``,
    `检索充分性 Sufficiency: ${sufficient ? `✓ 参数充足，可检索` : `✗ 参数不足，需补充机台/项目/代码`}`,
    `颜色 · Color:  ≥70% 绿色(高)  ≥40% 橙色(中)  <40% 灰色(低)`,
  ].join('\n');
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, cursor: 'default' }} title={tip}>
      <span style={{ display: 'inline-block', width: barW, height: barH, background: 'var(--surface-2)', borderRadius: 2, overflow: 'hidden', flexShrink: 0 }}>
        <span style={{ display: 'block', height: '100%', width: `${pct}%`, background: color, borderRadius: 2, transition: 'background 300ms, width 300ms' }} />
      </span>
      <span style={{ fontFamily: 'var(--font-mono)', fontSize: size === 'mini' ? 10 : 10.5, color }}>{pct}%</span>
      {size !== 'mini' && <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--muted)', marginLeft: 1 }}>conf</span>}
    </span>
  );
}

// --- AI-parsed parameter strip
function ParamStrip({ params, setParams, displayStyle }) {
  const typeDefs = window.KB_TYPE_DEFS || {};
  const [addingKw, setAddingKw] = rsUse(false);
  const addInputRef = React.useRef(null);
  React.useEffect(() => {
    if (addingKw && addInputRef.current) addInputRef.current.focus();
  }, [addingKw]);


  const summary = (
    <span>
      您询问
      {params.project ? <> <b>{params.project}</b> 项目</> : null}
      {params.equipment ? <>，<b>{params.equipment}</b> 机台</> : null}
      {params.code ? <>，错误代码 <b className="mono">{params.code}</b></> : null}
      {params.type ? (
        <>，类型 <b>{typeDefs[params.type]?.zh || params.type}</b></>
      ) : null}
      {params.keywords && params.keywords.length
        ? <>，关键词 <b>{params.keywords.join(" · ")}</b></>
        : null}
      。
    </span>
  );

  const removeKw = (kw) => {
    setParams({ ...params, keywords: params.keywords.filter((k) => k !== kw) });
  };

  return (
    <div className="param-strip">
      <div className="param-strip-head">
        <span className="param-tag">
          <Icon name="sparkle" size={12} />
          <span>AI 解析</span>
          <span className="param-tag-en">parsed query</span>
        </span>
        <span className="param-confidence">
          <ConfBadge params={params} />
        </span>
      </div>

      {displayStyle === "sentence" ? (
        <div className="param-sentence">{summary}</div>
      ) : (
        <div className="param-chips">
          {params.type ? (
            <Chip tone="solid" icon={<Icon name={typeIconMap[params.type]} size={12} />} removable onRemove={() => setParams({ ...params, type: null })}>
              <span className="chip-k">type</span>
              {typeDefs[params.type]?.zh || params.type}
            </Chip>
          ) : null}
          {params.project ? (
            <Chip tone="solid" removable onRemove={() => setParams({ ...params, project: null })}>
              <span className="chip-k">project</span>
              {params.project}
            </Chip>
          ) : null}
          {params.equipment ? (
            <Chip tone="solid" removable onRemove={() => setParams({ ...params, equipment: null })}>
              <span className="chip-k">equipment</span>
              {params.equipment}
            </Chip>
          ) : null}
          {params.code ? (
            <Chip tone="solid" removable onRemove={() => setParams({ ...params, code: null })}>
              <span className="chip-k">code</span>
              <span className="mono">{params.code}</span>
            </Chip>
          ) : null}
          {(params.keywords || []).map((kw) => (
            <Chip key={kw} tone="outline" removable onRemove={() => removeKw(kw)}>
              <span className="chip-k">kw</span>
              {kw}
            </Chip>
          ))}
          {addingKw ? (
            <input
              ref={addInputRef}
              className="kw-inline-input"
              placeholder="关键词 / keyword"
              onKeyDown={(e) => {
                if (e.key === 'Enter') {
                  const v = e.target.value.trim();
                  if (v) setParams({ ...params, keywords: [...(params.keywords || []), v] });
                  setAddingKw(false);
                }
                if (e.key === 'Escape') setAddingKw(false);
              }}
              onBlur={(e) => {
                const v = e.target.value.trim();
                if (v) setParams({ ...params, keywords: [...(params.keywords || []), v] });
                setAddingKw(false);
              }}
            />
          ) : (
            <button className="chip-add" onClick={() => setAddingKw(true)}>
              <Icon name="filter" size={12} /> 添加
            </button>
          )}
        </div>
      )}
    </div>
  );
}

// --- Single result card
function ResultCard({ scored, keywords, onOpen, mode, density, maxScore }) {
  const d = scored.doc;
  const isCompact = density === "compact";
  const snippet = React.useMemo(() => {
    const text = d.body || "";
    if (!keywords || keywords.length === 0) return text.slice(0, 140);
    const kw = keywords[0];
    const idx = text.toLowerCase().indexOf(kw.toLowerCase());
    if (idx === -1) return text.slice(0, 140);
    const start = Math.max(0, idx - 30);
    return (start > 0 ? "…" : "") + text.slice(start, start + 160);
  }, [d, keywords]);

  return (
    <article className={`result-card ${isCompact ? "result-card-compact" : ""}`} onClick={onOpen}>
      <div className="result-thumb-wrap">
        <Thumb kind={d.thumb} />
        <span className="thumb-overlay">
          <Icon name={typeIconMap[d.type]} size={11} />
        </span>
      </div>
      <div className="result-body">
        <div className="result-meta-row">
          <Chip tone="ghost">{d.project}</Chip>
          <Chip tone="ghost">{d.equipment}</Chip>
          {(d.codes || []).map((c) => (
            <Chip key={c} tone="code" icon={<span className="mono mini">CODE</span>}>
              <span className="mono">{c}</span>
            </Chip>
          ))}
        </div>
        <h3 className="result-title">{highlight(d.title, keywords)}</h3>
        <div className="result-title-en">{d.titleEn}</div>
        {d.summary ? (
          <p className="result-snippet result-summary">{d.summary}</p>
        ) : (!isCompact ? (
          <p className="result-snippet">{highlight(snippet, keywords)}</p>
        ) : null)}
        <div className="result-foot">
          <MatchBadge
            mode={mode}
            hits={scored.hits.length}
            total={keywords.length || 1}
          />
          <Score score={scored.score} maxScore={maxScore} mode={mode} />
          <span className="result-source mono" title={`来源文件 Source file: ${d.source.file}${d.source.pages ? ` · 页码 Pages: ${d.source.pages}` : ''}`}>
            <Icon name="doc" size={11} />
            {d.source.file} · p.{d.source.pages}
          </span>
        </div>
      </div>
    </article>
  );
}

// --- Disambiguation banner: too many strict hits
function DisambiguateBanner({ count, suggestions, onPick }) {
  return (
    <div className="disambig">
      <div className="disambig-head">
        <span className="disambig-tag">
          <Icon name="sparkle" size={12} /> 结果过多，请选择范围
        </span>
        <span className="disambig-en">Too many matches — click one option below to narrow down</span>
      </div>
      <div className="disambig-body">
        共命中 <b>{count}</b> 篇文档，无法确定最相关的一篇。请点击下方选项进一步缩小范围：
      </div>
      <div className="disambig-options">
        {suggestions.map((s, i) => (
          <button key={i} className="disambig-opt" onClick={() => onPick(s)}>
            <div className="disambig-opt-q">{s.label}</div>
            <div className="disambig-opt-hint mono">{s.hint}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

// --- Fallback notice (loose match)
function LooseNotice({ banner, isSentence, onRetry }) {
  const msg = banner || "未找到 100% 匹配的知识。以下结果由宽松检索得到，仅包含部分关键词，请用户自行判断是否相关。";
  const label = isSentence ? '语义检索结果' : '宽松检索结果';
  return (
    <div className="loose-notice">
      <Icon name="info" size={14} />
      <div className="loose-text">
        <b>{label}</b> {msg}
      </div>
      <button className="loose-action" onClick={onRetry}>切换为严格关键词 →</button>
    </div>
  );
}

// --- No results
function EmptyState({ onBack }) {
  return (
    <div className="empty-state">
      <div className="empty-illus">
        <svg viewBox="0 0 80 80" width="64" height="64">
          <rect x="6" y="14" width="52" height="56" rx="2" fill="none" stroke="currentColor" strokeWidth="1.2" opacity="0.5" />
          <path d="M14 26h36M14 34h24M14 42h30M14 50h18" stroke="currentColor" strokeWidth="1" opacity="0.3" />
          <circle cx="58" cy="58" r="14" fill="none" stroke="currentColor" strokeWidth="1.5" />
          <path d="m68 68 8 8" stroke="currentColor" strokeWidth="1.5" />
          <path d="M52 52l12 12M64 52L52 64" stroke="currentColor" strokeWidth="1.2" opacity="0.7" />
        </svg>
      </div>
      <div className="empty-title">知识库中暂无匹配内容</div>
      <div className="empty-sub">系统不会编造答案。建议调整筛选条件，或联系负责工程师补充知识。</div>
      <button className="btn btn-ghost" onClick={onBack}>← 返回检索</button>
    </div>
  );
}

// --- Detail drawer
function Detail({ doc, keywords, onClose }) {
  rsEff(() => {
    const h = (e) => e.key === "Escape" && onClose();
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [onClose]);

  const [copied, setCopied] = rsUse(false);
  const copySourceFile = () => {
    const filename = doc.source?.file;
    if (!filename || filename === '—') return;
    navigator.clipboard.writeText(filename).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    }).catch(() => {});
  };

  if (!doc) return null;

  return (
    <div className="drawer-shade" onClick={onClose}>
      <aside className="drawer" onClick={(e) => e.stopPropagation()}>
        <header className="drawer-head">
          <div className="drawer-crumbs">
            <span>{doc.project}</span>
            <span className="crumb-sep">/</span>
            <span>{doc.equipment}</span>
            <span className="crumb-sep">/</span>
            <span className="mono">{doc.id}</span>
          </div>
          <button className="icon-btn" onClick={onClose} aria-label="close">
            <Icon name="x" size={16} />
          </button>
        </header>

        <div className="drawer-hero">
          <Thumb kind={doc.thumb || 'lines'} />
        </div>

        <div className="drawer-body">
          <div className="drawer-tags">
            <Chip tone="ghost" icon={<Icon name={typeIconMap[doc.type] || 'doc'} size={11} />}>
              {(window.KB_TYPE_DEFS || {})[doc.type]?.zh || doc.type || '—'}
            </Chip>
            {doc.project && <Chip tone="ghost">{doc.project}</Chip>}
            {doc.equipment && <Chip tone="ghost">{doc.equipment}</Chip>}
            {(doc.codes || []).map((c) => (
              <Chip key={c} tone="code"><span className="mono">{c}</span></Chip>
            ))}
          </div>

          <h2 className="drawer-title">{highlight(doc.title, keywords)}</h2>
          {doc.titleEn && <div className="drawer-title-en">{doc.titleEn}</div>}

          {doc.body ? (
          <section className="drawer-section">
            <h4>说明 · Description</h4>
            <p className="drawer-prose">{highlight(doc.body, keywords)}</p>
          </section>
          ) : doc.summary ? (
          <section className="drawer-section">
            <h4>摘要 · Summary</h4>
            <p className="drawer-prose">{doc.summary}</p>
          </section>
          ) : null}

          {doc.procedure ? (
            <section className="drawer-section">
              <h4>解除流程 · Procedure</h4>
              <pre className="drawer-prose drawer-pre">{doc.procedure}</pre>
            </section>
          ) : null}

          {doc.notes ? (
            <section className="drawer-section drawer-section-note">
              <h4>注意事项 · Notes</h4>
              <pre className="drawer-prose drawer-pre">{doc.notes}</pre>
            </section>
          ) : null}

          {doc.source && (
          <section className="drawer-section drawer-source">
            <h4>来源 · Source</h4>
            <div className="source-row">
              <Icon name="doc" size={14} />
              <span className="source-file mono">{doc.source.file}</span>
              <span className="source-pages mono">页 / pages: {doc.source.pages}</span>
              <button className={`src-btn ${copied ? 'src-btn-copied' : ''}`} onClick={copySourceFile}>
                {copied
                  ? <><Icon name="check" size={11} /> 已复制</>
                  : <>打开原文档 <Icon name="external" size={11} /></>}
              </button>
            </div>
          </section>
          )}
        </div>
      </aside>
    </div>
  );
}

window.ParamStrip = ParamStrip;
window.ResultCard = ResultCard;
window.DisambiguateBanner = DisambiguateBanner;
window.LooseNotice = LooseNotice;
window.EmptyState = EmptyState;
window.Detail = Detail;

</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel">
// Main app: state machine across landing, results, disambiguation, detail.
// Also: a tiny rule-based "AI parser" that extracts params from a free-text query
// using the domain's enum lists (projects, equipment, codes, types).

const { useState: aUs, useEffect: aUe, useMemo: aMemo, useCallback: aCb } = React;

// --- The parser. Deterministic rule-based extractor using ES taxonomy enums.
function parseQuery(q) {
  const tax      = window.KB_TAXONOMY || {};
  const projects = tax.projects  || [];
  const equips   = tax.equipment || [];
  const text  = q;
  const lower = q.toLowerCase();

  const project = projects.find((p) => text.includes(p)) || null;
  const equip   = equips.find((e) => lower.includes(e.toLowerCase())) || null;

  // codes: numeric 5-7 digit alarms, or alphanumeric forms like ERR-115, SP-0421
  let code = null;
  const codeMatch = text.match(/\b([A-Z]{1,4}[-_]?\d{3,7}|\d{5,7})\b/);
  if (codeMatch) code = codeMatch[1];

  // Detect natural-language / question-form queries — skip type forcing to avoid over-constraining
  const isSentence = /如何|怎么|怎样|是什么|什么是|是否|为什么|为何|多少|[？?]/.test(text);

  // type — keyword heuristics; disabled for sentence queries
  let type = null;
  if (!isSentence) {
    if (/报警|alarm|error|err|代码|code/i.test(text)) type = "alarm";
    else if (/setup|装夹|安装|配置|校准|calibrat/i.test(text)) type = "setup";
    else if (/经验|漂移|抖动|不均|chatter|drift|wobble|uneven/i.test(text)) type = "experience";
  }

  // keywords: strip matched tokens, extract CJK runs ≥2 and Latin words ≥3
  let remainder = text;
  [project, equip, code].forEach((tok) => {
    if (tok) remainder = remainder.split(tok).join(" ");
  });
  remainder = remainder
    .replace(/怎么处理|如何处理|怎么办|是什么|什么是|的处理|的解决|的方法|如何|怎么|怎样|是否|为什么|为何/g, " ")
    .replace(/解决|处理|操作|使用|查看|检查|修复|修改|设置|配置|校准|验证|确认|原因|步骤|方法|流程|注意/g, " ")
    .replace(/[，。？！,.?!:;:：；()（）"'""]/g, " ");

  // Generic bigrams to drop \u2014 category suffixes and vague modifiers that add noise.
  const GENERIC_TAIL = new Set([
    "\u62a5\u8b66", "\u6545\u969c", "\u5931\u8d25", "\u9519\u8bef", "\u5f02\u5e38",
    "\u95ee\u9898", "\u62a5\u9519", "\u8b66\u544a",
    "\u76f8\u5173", "\u6709\u5173", "\u5904\u7406", "\u64cd\u4f5c", "\u89e3\u51b3",
  ]);
  const tokens = [];
  const cjk = remainder.match(/[\u4e00-\u9fff]+/g) || [];
  cjk.forEach((c) => {
    if (isSentence) {
      // Split at structural particles (\u7684/\u5730/\u5f97) so bigram strides never cross a
      // grammatical boundary and produce nonsense like "\u7684\u62a5".
      const parts = c.split(/[\u7684\u5730\u5f97]/).filter(p => p.length >= 2);
      const before = tokens.length;
      parts.forEach(part => {
        if (part.length >= 4) {
          for (let i = 0; i + 2 <= part.length; i += 2) {
            const bigram = part.slice(i, i + 2);
            if (!GENERIC_TAIL.has(bigram)) tokens.push(bigram);
          }
        } else if (!GENERIC_TAIL.has(part)) {
          tokens.push(part);
        }
      });
      // Fallback: always keep at least the first content bigram
      if (tokens.length === before && c.length >= 2) tokens.push(c.slice(0, 2));
    } else if (c.length >= 2) {
      tokens.push(c);
    }
  });
  const latin = remainder.match(/[A-Za-z][A-Za-z0-9\-_]{2,}/g) || [];
  latin.forEach((w) => {
    if (!projects.includes(w) && !equips.includes(w)) tokens.push(w);
  });

  const seen = new Set();
  const keywords = [];
  tokens.forEach((t) => {
    const k = t.toLowerCase();
    if (!seen.has(k)) { seen.add(k); keywords.push(t); }
  });

  return { project, equipment: equip, code, type, keywords: keywords.slice(0, 5), raw: q, isSentence };
}

// Builds a follow-up clarifying question when >= 3 results are returned.
// Uses general category language — no specific codes or DB-specific values.
function buildClarifyQuestion(merged, hits) {
  const tax = window.KB_TAXONOMY || {};
  const typeDefs = window.KB_TYPE_DEFS || {};
  const parts = [];
  if (!merged.equipment) {
    const equips = (tax.equipment || []).slice(0, 3);
    parts.push(equips.length
      ? `具体是哪类机台/设备（如 ${equips.join('、')} 等）？`
      : '具体是哪类机台/设备？');
  }
  if (!merged.project && (tax.projects || []).length > 1) {
    parts.push('是哪个项目/产线？');
  }
  const hitTypes = [...new Set(hits.map(h => h.doc?.type).filter(Boolean))];
  if (hitTypes.length > 1) {
    parts.push(`结果包含 ${hitTypes.map(t => typeDefs[t]?.zh || t).join('和')}，您需要哪一类？`);
  } else if (!merged.type) {
    parts.push('是报警处理、操作设置，还是设备维修经验？');
  }
  if (!merged.code && !merged.keywords?.length) {
    parts.push('能否描述更具体的故障现象或报警类型（例如温度相关、真空相关、机械相关）？');
  }
  if (parts.length === 0) {
    parts.push('能否进一步描述故障场景，帮助精确定位最相关的文档？');
  }
  return `找到 ${hits.length} 篇相关文档，为精确定位，请进一步说明：\n\n${parts.map(p => `• ${p}`).join('\n')}`;
}

// --- Chat Home Page (primary chat-first interface)
function ChatHomePage({ taxonomy, onSwitchToSearch, onOpenDoc }) {
  const [msgs, setMsgs]     = aUs([]);
  const [inp, setInp]       = aUs('');
  const [busy, setBusy]     = aUs(false);
  const [accum, setAccum]   = aUs({ project: null, equipment: null, type: null, code: null, keywords: [] });
  const [showHistory, setShowHistory] = aUs(false);
  const [historyList, setHistoryList] = aUs(() => window.getRecentSearches?.() || []);
  const [showRevise, setShowRevise]   = aUs(false);
  const [reviseFields, setReviseFields] = aUs({ project: '', equipment: '', type: '', keywords: '' });
  const [sideChatOpen, setSideChatOpen] = aUs(false);
  const endRef   = React.useRef(null);
  const inputRef = React.useRef(null);

  aUe(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs]);

  const latestResult = aMemo(() => {
    for (let i = msgs.length - 1; i >= 0; i--) {
      if (msgs[i].kind === 'results' || msgs[i].kind === 'search_answer') return msgs[i];
    }
    return null;
  }, [msgs]);

  const hasParams = !!(accum.project || accum.equipment || accum.type || accum.code || accum.keywords?.length);

  const normalizeEx = (e) => {
    if (!e || typeof e !== 'object') return null;
    const asStr = v => (typeof v === 'string' && v.trim()) ? v.trim() : null;
    const asArr = v => Array.isArray(v) ? v.filter(x => typeof x === 'string' && x.trim()).map(x => x.trim()) : [];
    const kt = asStr(e.knowledge_type);
    return {
      project:        asStr(e.project),
      equipment:      asStr(e.equipment),
      knowledge_type: ['alarm','setup','experience'].includes(kt) ? kt : null,
      error_codes:    asArr(e.error_codes),
      keywords:       asArr(e.keywords),
      is_sentence:    e.is_sentence === true,
    };
  };

  const sendMsg = aCb(async (text) => {
    if (!text || busy) return;
    const userMsg = { role: 'user', content: text };
    const history = [...msgs, userMsg];
    setMsgs(history);
    setBusy(true);

    try {
      const apiMessages = history
        .filter(m => m.content && typeof m.content === 'string' && m.content.trim())
        .map(m => ({ role: m.role, content: m.content }));

      const resp = await fetch('/api/v1/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: apiMessages }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${resp.status}`);
      }
      const data = await resp.json();

      if (data.effective_params) {
        setAccum({
          project:   data.effective_params.project || null,
          equipment: data.effective_params.equipment || null,
          type:      data.effective_params.knowledge_type || null,
          code:      data.effective_params.error_codes?.[0] || null,
          keywords:  data.effective_params.keywords || [],
        });
      }

      const reply = data.content || '（无回复）';
      const hits = data.search_results || [];

      if (hits.length > 0) {
        const ss = data.search_status || '';
        const isStrict = ss === 'strict_hit';
        const banner = isStrict ? '完全匹配'
          : ss === 'vector_only' ? '语义相关（低置信度，仅供参考）'
          : ss === 'loose_hit' ? '不完全匹配，仅供参考' : '';
        setMsgs(m => [...m, {
          role: 'assistant', kind: 'search_answer', content: reply,
          banner, bannerKind: isStrict ? 'full' : 'partial',
          hits: hits.slice(0, 5).map(h => hitToDoc(h, [])),
          total: hits.length,
        }]);
        if (window.saveRecentSearch) window.saveRecentSearch(text, data.effective_params?.project, data.effective_params?.equipment);
        setHistoryList(window.getRecentSearches?.() || []);
      } else {
        setMsgs(m => [...m, { role: 'assistant', kind: 'text', content: reply }]);
      }
    } catch (err) {
      setMsgs(m => [...m, { role: 'assistant', kind: 'text', content: `⚠ ${err.message}` }]);
    }
    setBusy(false);
    setTimeout(() => inputRef.current?.focus(), 50);
  }, [msgs, inp, busy, accum]);

  const reset = () => {
    setMsgs([]);
    setAccum({ project: null, equipment: null, type: null, code: null, keywords: [] });
  };

  const doSend = () => {
    const t = inp.trim();
    if (t && !busy) { setInp(''); sendMsg(t); }
  };

  const deleteHistoryItem = (idx) => {
    const updated = historyList.filter((_, i) => i !== idx);
    setHistoryList(updated);
    try { localStorage.setItem('kb.recentSearches', JSON.stringify(updated)); } catch(e) {}
  };
  const clearHistory = () => {
    setHistoryList([]);
    try { localStorage.removeItem('kb.recentSearches'); } catch(e) {}
  };
  const openRevise = () => {
    setReviseFields({
      project:   accum.project   || '',
      equipment: accum.equipment || '',
      type:      accum.type      || '',
      keywords:  (accum.keywords || []).join(', '),
    });
    setShowRevise(true);
  };
  const rerunSearchWithParams = aCb(async (sp) => {
    if (busy) return;
    setBusy(true);
    const searchP = { ...sp, raw: sp.keywords?.join(' ') || sp.equipment || sp.project || '' };
    let res = null;
    try { res = await window.KB_SEARCH(searchP, 'auto', 0); }
    catch(err) {
      setMsgs(m => [...m, { role:'assistant', kind:'text', content:`⚠ 检索失败：${err.message}` }]);
      setBusy(false); return;
    }
    const rHits = Array.isArray(res?.hits) ? res.hits : [];
    const rStatus = res?.status || '';
    if (rStatus === 'too_many') {
      setMsgs(m => [...m, { role:'assistant', kind:'text',
        content:`匹配到 ${res.total} 篇，请进一步缩小范围。` }]);
    } else if (rHits.length > 0) {
      const isStrict = rStatus === 'strict_hit';
      setMsgs(m => [...m, { role:'assistant', kind:'results',
        banner: isStrict ? '完全匹配' : '不完全匹配，请认真鉴别',
        bannerKind: isStrict ? 'full' : 'partial',
        hits: rHits.slice(0, 5), total: res.total }]);
      if (rHits.length >= 3) {
        setMsgs(m => [...m, { role:'assistant', kind:'text',
          content: buildClarifyQuestion(sp, rHits) }]);
      }
    } else {
      setMsgs(m => [...m, { role:'assistant', kind:'text',
        content:'未找到匹配知识，请调整检索条件。' }]);
    }
    setBusy(false);
    setTimeout(() => inputRef.current?.focus(), 50);
  }, [busy]);
  const applyRevise = () => {
    const newAccum = {
      project:   reviseFields.project   || null,
      equipment: reviseFields.equipment || null,
      type:      reviseFields.type      || null,
      code:      accum.code,
      keywords:  reviseFields.keywords
        ? reviseFields.keywords.split(/[,，\s]+/).filter(Boolean)
        : accum.keywords || [],
      isSentence: false,
    };
    setAccum(newAccum);
    setShowRevise(false);
    setMsgs(m => [...m, { role:'user', content:'（修改条件后重新检索）' }]);
    rerunSearchWithParams(newAccum);
  };

  const typeDefs = window.KB_TYPE_DEFS || {};

  const starters = [
    '温度相关的报警如何处理？',
    '设备 setup 校准的标准步骤',
    '真空系统异常故障排查经验',
    '传送机构漂移或抖动问题',
  ];

  return (
    <div className="chat-home-wrap">
      <div className="chat-home-body">

        {/* ── Left: conversation ── */}
        <div className="chat-home-chat">
          <div className="chat-home-messages">
            {msgs.length === 0 ? (
              <div className="chat-home-welcome">
                <div className="chat-home-welcome-icon">
                  <Icon name="sparkle" size={26} />
                </div>
                <h2>和我对话来检索知识库</h2>
                <p>描述遇到的问题、设备名或报警代码 — 我会自动提取关键词并即时检索。</p>
                <p style={{ fontSize: '12px', color: 'var(--muted-2)' }}>
                  Describe your issue, equipment name or alarm code — keywords are extracted instantly.
                </p>
                <div className="chat-home-starters">
                  {starters.map((s, i) => (
                    <button key={i} className="chat-home-starter"
                      onClick={() => { setInp(''); sendMsg(s); }}>
                      {s}
                    </button>
                  ))}
                </div>
              </div>
            ) : (
              msgs.map((m, i) => {
                if (m.kind === 'search_answer') {
                  return (
                    <div key={i} className="ch-msg ch-msg-ai">
                      <div className="ch-avatar"><Icon name="sparkle" size={14} /></div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div className="ch-bubble ch-md"
                          dangerouslySetInnerHTML={{ __html: window.marked ? window.marked.parse(m.content) : m.content }}
                        />
                        {m.hits && m.hits.length > 0 && (
                          <div className="ch-results-wrap" style={{ marginTop: 6 }}>
                            <div className={`ch-results-banner${m.bannerKind === 'partial' ? ' partial' : ''}`}>
                              {m.banner}
                            </div>
                            {m.hits.map((h, j) => (
                              <div key={j} className="ch-result-card" onClick={() => onOpenDoc && onOpenDoc(h.doc)}>
                                <div className="ch-result-title">{h.doc.title}</div>
                                <div className="ch-result-meta">
                                  {h.doc.type      && <span>{typeDefs[h.doc.type]?.zh || h.doc.type}</span>}
                                  {h.doc.project   && <span>· {h.doc.project}</span>}
                                  {h.doc.equipment && <span>· {h.doc.equipment}</span>}
                                  {h.doc.codes?.length > 0 && <span>· {h.doc.codes.slice(0,3).join(', ')}</span>}
                                </div>
                                {h.doc.summary && <div className="ch-result-summary">{h.doc.summary}</div>}
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  );
                }
                if (m.kind === 'results') {
                  return (
                    <div key={i} className="ch-msg ch-msg-ai">
                      <div className="ch-avatar"><Icon name="sparkle" size={14} /></div>
                      <div className="ch-results-wrap">
                        <div className={`ch-results-banner${m.bannerKind === 'partial' ? ' partial' : ''}`}>
                          {m.banner}
                          {typeof m.total === 'number' && m.total > m.hits.length
                            ? `（共 ${m.total} 条，显示前 ${m.hits.length} 条）` : ''}
                        </div>
                        {m.hits.map((h, j) => (
                          <div key={j} className="ch-result-card" onClick={() => onOpenDoc && onOpenDoc(h.doc)}>
                            <div className="ch-result-title">{h.doc.title}</div>
                            <div className="ch-result-meta">
                              {h.doc.type      && <span>{typeDefs[h.doc.type]?.zh || h.doc.type}</span>}
                              {h.doc.project   && <span>· {h.doc.project}</span>}
                              {h.doc.equipment && <span>· {h.doc.equipment}</span>}
                              {h.doc.codes?.length > 0 && <span>· {h.doc.codes.slice(0,3).join(', ')}</span>}
                            </div>
                            {h.doc.summary && <div className="ch-result-summary">{h.doc.summary}</div>}
                          </div>
                        ))}
                        {typeof m.total === 'number' && m.total > m.hits.length && (
                          <button className="chs-switch-btn"
                            onClick={() => onSwitchToSearch && onSwitchToSearch(accum)}>
                            <Icon name="search" size={13} />
                            在关键词检索中查看全部 {m.total} 条结果
                          </button>
                        )}
                      </div>
                    </div>
                  );
                }
                return (
                  <div key={i} className={`ch-msg${m.role === 'user' ? ' ch-msg-user' : ' ch-msg-ai'}`}>
                    {m.role === 'assistant' && <div className="ch-avatar"><Icon name="sparkle" size={14} /></div>}
                    {m.role === 'assistant'
                      ? <div className="ch-bubble ch-md"
                          dangerouslySetInnerHTML={{ __html: window.marked ? window.marked.parse(m.content) : m.content }}
                        />
                      : <div className="ch-bubble">{m.content}</div>
                    }
                  </div>
                );
              })
            )}
            {busy && (
              <div className="ch-msg ch-msg-ai">

                <div className="ch-bubble" style={{ padding: '12px 16px' }}>

                </div>

                  accum.equipment && `机台 ${accum.equipment}`,

// --- Results page (filters sidebar + grid) — async, backed by ES via FastAPI
function ResultsPage({ taxonomy, stats, params, setParams, mode, setMode, paramDisplay, density, onOpen, onResultsChange, onBack }) {
  const typeDefs = window.KB_TYPE_DEFS || {};

  // Async search state
  const [result, setResult]   = rsUse(null);
  const [loading, setLoading] = rsUse(false);
  const [error, setError]     = rsUse(null);

  rsEff(() => {
    if (!params) return;
    setLoading(true);
    setError(null);
    window.KB_SEARCH(params, mode).then(r => {
      setResult(r);
      onResultsChange && onResultsChange(r);
      setLoading(false);
    }).catch(err => {
      setError(err.message);
      setLoading(false);
    });
  }, [params, mode]);

  const [editingQuery, setEditingQuery] = rsUse(false);
  const [editText, setEditText]         = rsUse(params.raw || "");

  const submitEdit = () => {
    if (!editText.trim()) return;
    setParams(parseQuery(editText.trim()));
    setEditingQuery(false);
  };

  // Sidebar facet data from pre-loaded stats (total counts, not filtered)
  const kts       = taxonomy?.knowledge_types || [];
  const projects  = taxonomy?.projects        || [];
  const equipment = taxonomy?.equipment       || [];
  const byProject  = stats?.by_project  || {};
  const byEquip    = stats?.by_equipment || {};
  const byType     = stats?.by_type     || {};

  // Interpret search result
  const hits         = result?.hits       || [];
  const total        = result?.total      || 0;
  const searchStatus = result?.status     || null;
  const isLoose      = searchStatus === 'loose_hit' || searchStatus === 'vector_only';
  const isTooMany    = searchStatus === 'too_many';
  const isEmpty      = searchStatus === 'no_hit' || (!loading && result && hits.length === 0);
  const maxScore     = hits.length ? Math.max(...hits.map(h => h.score)) : 1;

  return (
    <div className="results-page">
      {/* Top bar: search + AI parse */}
      <div className="results-topbar">
        <div className="results-search-row">
          {editingQuery ? (
            <form className="search-box search-box-inline"
                  onSubmit={(e) => { e.preventDefault(); submitEdit(); }}>
              <Icon name="search" size={16} />
              <input autoFocus value={editText}
                     onChange={(e) => setEditText(e.target.value)}
                     onKeyDown={(e) => e.key === "Escape" && setEditingQuery(false)} />
              <button type="submit" className="btn btn-primary btn-sm">重新解析</button>
            </form>
          ) : (
            <div className="search-box search-box-inline search-box-static"
                 onClick={() => { setEditText(params.raw || ""); setEditingQuery(true); }}>
              <Icon name="search" size={16} />
              <span className="search-query">{params.raw}</span>
              <span className="search-edit-hint">
                <Icon name="edit" size={12} /> 修改 / edit
              </span>
            </div>
          )}
        </div>
        <ParamStrip params={params} setParams={setParams} displayStyle={paramDisplay} />
      </div>

      <div className="results-main">
        {/* Filter sidebar */}
        <aside className="filter-side">
          <div className="filter-head">
            <Icon name="filter" size={13} />
            <span>筛选 · Filters</span>
          </div>

          <FilterGroup label="类型" labelEn="Type">
            {kts.map((kt) => (
              <FilterRow key={kt}
                active={params.type === kt}
                onClick={() => setParams({ ...params, type: params.type === kt ? null : kt })}
                label={typeDefs[kt]?.zh || kt}
                en={typeDefs[kt]?.en || kt}
                count={byType[kt] || 0}
                icon={typeIconMap[kt]}
              />
            ))}
          </FilterGroup>

          <FilterGroup label="项目" labelEn="Project">
            {projects.map((p) => (
              <FilterRow key={p}
                active={params.project === p}
                onClick={() => setParams({ ...params, project: params.project === p ? null : p })}
                label={p}
                count={byProject[p] || 0}
              />
            ))}
          </FilterGroup>

          <FilterGroup label="机台 / 设备" labelEn="Equipment">
            {equipment.map((eq) => (
              <FilterRow key={eq}
                active={params.equipment === eq}
                onClick={() => setParams({ ...params, equipment: params.equipment === eq ? null : eq })}
                label={eq}
                count={byEquip[eq] || 0}
              />
            ))}
          </FilterGroup>
        </aside>

        {/* Results body */}
        <main className="results-body">
          {loading ? (
            <div className="kb-loading">
              <div className="kb-spinner" />
              <span>检索中… Searching</span>
            </div>
          ) : error ? (
            <div style={{ padding: "40px 0", textAlign: "center", color: "var(--danger)", fontSize: 13 }}>
              检索失败：{error}
            </div>
          ) : (
            <>
              <div className="results-stat-row">
                <div className="results-stat">
                  {searchStatus === 'strict_hit' && <><b title="所有关键词均命中的结果数">{total}</b> 篇严格匹配 · strict</>}
                  {searchStatus === 'loose_hit'  && <><b title="部分关键词命中的结果数（宽松模式）">{total}</b> 篇宽松匹配 · loose</>}
                  {searchStatus === 'vector_only' && <><b title="语义向量检索命中数">{total}</b> 篇语义匹配 · vector</>}
                  {searchStatus === 'too_many'   && <><b title="命中文档过多，请进一步缩小筛选范围">{total}</b> 篇匹配（过多）</>}
                  {searchStatus === 'no_hit'     && <>无匹配结果</>}
                  {!searchStatus && <>—</>}
                  {searchStatus && searchStatus !== 'vector_only' && searchStatus !== 'no_hit' && (
                    <span className="results-stat-sep">·</span>
                  )}
                  {searchStatus === 'strict_hit' || searchStatus === 'loose_hit' ? (
                    <span className="results-stat-muted" title="两阶段检索：关键词精确召回候选 → BM25 词频 + 向量语义联合重排序 · Two-stage: keyword recall → BM25 + vector hybrid reranking">
                      关键词召回 → <span className="mono" style={{ fontSize: '10.5px' }}>BM25</span> · 向量排序
                    </span>
                  ) : searchStatus === 'vector_only' ? (
                    <span className="results-stat-muted" title="纯语义向量检索（无关键词匹配，置信度较低） · Pure semantic vector search — no keyword match, lower confidence">
                      语义向量检索
                    </span>
                  ) : null}
                </div>
                <div className="results-mode-toggle">
                  <button className={`mode-btn ${mode === "strict" ? "mode-on" : ""}`}
                          onClick={() => setMode("strict")}>
                    <span className="mode-dot mode-dot-strict" /> 严格 Strict
                  </button>
                  <button className={`mode-btn ${mode === "loose" ? "mode-on" : ""}`}
                          onClick={() => setMode("loose")}>
                    <span className="mode-dot mode-dot-loose" /> 宽松 Loose
                  </button>
                </div>
              </div>

              {isTooMany && (
                <DisambiguateBanner
                  count={total}
                  suggestions={buildSuggestionsFromFacets(result.facets, params)}
                  onPick={(s) => setParams({ ...params, ...s.apply })}
                />
              )}

              {isLoose && result.banner && (
                <LooseNotice
                  banner={params.isSentence
                    ? '问句模式：已使用语义+关键词检索，结果按相关度排序。如需更精确的关键词匹配，请切换至严格模式。'
                    : result.banner}
                  isSentence={params.isSentence}
                  onRetry={() => setMode("strict")}
                />
              )}

              {isEmpty ? (
                <EmptyState onBack={onBack || (() => setMode("strict"))} />
              ) : (
                <div className={`result-grid ${density === "compact" ? "result-grid-compact" : ""}`}>
                  {hits.map((s) => (
                    <ResultCard key={s.doc.id} scored={s}
                      keywords={params.keywords} mode={isLoose ? "loose" : "strict"}
                      density={density} maxScore={maxScore} onOpen={() => onOpen(s.doc)} />
                  ))}
                </div>
              )}
            </>
          )}
        </main>
      </div>
    </div>
  );
}

function FilterGroup({ label, labelEn, children, defaultOpen = true }) {
  const [open, setOpen] = React.useState(defaultOpen);
  return (
    <div className="filter-group">
      <button
        className="filter-group-head"
        onClick={() => setOpen(o => !o)}
        aria-expanded={open}
        title={open ? '收起 · Collapse' : '展开 · Expand'}

        <span>{label}</span>
        {labelEn && <span className="filter-group-en">{labelEn}</span>}

          </svg>
        </span>
      </button>
      {open && <div className="filter-rows">{children}</div>}

}

function FilterRow({ active, onClick, label, en, count, icon }) {
  return (
    <button className={`filter-row ${active ? "filter-row-on" : ""}`} onClick={onClick}>
      <span className="filter-row-main">
        {icon ? <Icon name={icon} size={12} /> : null}
        <span className="filter-row-label">{label}</span>
        {en ? <span className="filter-row-en">{en}</span> : null}
      </span>
      <span className="filter-row-count mono" title={`知识库中共 ${count} 篇文档属于此类别 · ${count} documents in this category`}>{count}</span>
    </button>
  );
}

function buildSuggestionsFromFacets(facets, params) {
  const out = [];
  if (!facets) return out;
  // Backend facets keys: "equipment", "project", "error_codes" (no by_ prefix).
  if (!params.equipment && facets.equipment) {
    Object.entries(facets.equipment)
      .sort((a, b) => b[1] - a[1]).slice(0, 3)
      .forEach(([eq, n]) => {
        out.push({ label: `仅看 ${eq} 机台`, hint: `${n} 篇文档 · ${n} docs`, apply: { equipment: eq } });
      });
  }
  if (!params.project && facets.project) {
    Object.entries(facets.project)
      .sort((a, b) => b[1] - a[1]).slice(0, 2)
      .forEach(([p, n]) => {
        out.push({ label: `仅看 ${p} 项目`, hint: `${n} 篇文档 · ${n} docs`, apply: { project: p } });
      });
  }
  // Show code suggestions only when few codes exist (avoid overwhelming the user)
  if (!params.code && facets.error_codes) {
    const codes = Object.entries(facets.error_codes).sort((a, b) => b[1] - a[1]);
    if (codes.length <= 6) {
      codes.slice(0, 2).forEach(([c, n]) => {
        out.push({ label: `报警代码 ${c}`, hint: `${n} 篇文档`, apply: { code: c } });
      });
    }
  }
  return out.slice(0, 4);
}

            ))}

          <FilterGroup label="项目" labelEn="Project">
            {projects.map(p => (
              <FilterRow key={p} active={filters.project === p}
                onClick={() => setFilters(f => ({ ...f, project: f.project === p ? null : p }))}
                label={p} count={byProject[p] || 0} />
            ))}
          </FilterGroup>
          <FilterGroup label="机台 / 设备" labelEn="Equipment">
            {equips.map(eq => (
              <FilterRow key={eq} active={filters.equipment === eq}

        </aside>
        <main className="results-body">
          {loading && offset === 0 ? (
            <div className="kb-loading"><div className="kb-spinner" /><span>加载中… Loading</span></div>
          ) : error ? (
            <div style={{ padding: "40px 0", textAlign: "center", color: "var(--danger)", fontSize: 13 }}>加载失败：{error}</div>
          ) : (
            <>
