              {hasMore && (
                <div style={{ textAlign: "center", marginTop: 24 }}>
                  <button className="btn" onClick={() => setOffset(hits.length)} disabled={loading}>
                    {loading ? "加载中…" : `加载更多 · Load more (${total - hits.length} 剩余)`}
                  </button>
                </div>
              )}
            </>
          )}
        </main>
      </div>
    </div>
  );
}

// --- Admin page: stats + taxonomy reload + add knowledge form
// ── Import Page ─────────────────────────────────────────────────────────────

function ImportPage({ taxonomy, onStatsRefresh }) {
  const [phase, setPhase]           = React.useState('upload'); // upload | processing | preview | committing | result
  const [sessionId, setSessionId]   = React.useState(null);
  const [files, setFiles]           = React.useState([]);
  const [documents, setDocuments]   = React.useState([]);
  const [progress, setProgress]     = React.useState({ total: 0, processed: 0 });
  const [processMsg, setProcessMsg] = React.useState('');
  const [elapsed, setElapsed]       = React.useState(0);
  const [expanded, setExpanded]     = React.useState({});
  const [commitResult, setCommitResult] = React.useState(null);
  const [commitProgress, setCommitProgress] = React.useState({ current: 0, total: 0, phase: 'syncing' });
  const [toast, setToast]           = React.useState(null);
  const [loading, setLoading]       = React.useState(false);
  const elapsedTimerRef             = React.useRef(null);

  // Hints
  const [ktHint, setKtHint]         = React.useState('');
  const [projHint, setProjHint]     = React.useState('');
  const [equipHint, setEquipHint]   = React.useState('');
  const [folderPath, setFolderPath] = React.useState('');
  const [dragOver, setDragOver]     = React.useState(false);
  const fileInputRef = React.useRef(null);

  const showToast = (msg, kind = 'ok') => {
    setToast({ msg, kind });
    setTimeout(() => setToast(null), 3500);
  };

  // ── Upload handler ──
  const handleFiles = async (fileList) => {
    if (!fileList || fileList.length === 0) return;
    setLoading(true);
    const formData = new FormData();
    for (const f of fileList) formData.append('files', f);
    if (ktHint) formData.append('knowledge_type_hint', ktHint);
    if (projHint) formData.append('project_hint', projHint);
    if (equipHint) formData.append('equipment_hint', equipHint);

    try {
      const resp = await fetch('/api/v1/ingest/upload', { method: 'POST', body: formData });
      if (!resp.ok) throw new Error(`Upload failed: ${resp.status}`);
      const data = await resp.json();
      setSessionId(data.session_id);
      setFiles(data.files);
      setProcessMsg('');
      setElapsed(0);
      setPhase('processing');
      startElapsedTimer();
      pollSession(data.session_id);
    } catch (err) {
      showToast(err.message, 'err');
    }
    setLoading(false);
  };

  // ── Folder scan handler ──
  const handleScan = async () => {
    if (!folderPath.trim()) return;
    setLoading(true);
    try {
      const resp = await fetch('/api/v1/ingest/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          folder_path: folderPath,
          knowledge_type_hint: ktHint || null,
          project_hint: projHint || null,
          equipment_hint: equipHint || null,
        }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.detail || `Scan failed: ${resp.status}`);
      }
      const data = await resp.json();
      setSessionId(data.session_id);
      setFiles(data.files);
      setProcessMsg('');
      setElapsed(0);
      setPhase('processing');
      startElapsedTimer();
      pollSession(data.session_id);
    } catch (err) {
      showToast(err.message, 'err');
    }
    setLoading(false);
  };

  // ── Elapsed time counter ──
  const startElapsedTimer = () => {
    if (elapsedTimerRef.current) clearInterval(elapsedTimerRef.current);
    const start = Date.now();
    elapsedTimerRef.current = setInterval(() => {
      setElapsed(Math.floor((Date.now() - start) / 1000));
    }, 1000);
  };
  const stopElapsedTimer = () => {
    if (elapsedTimerRef.current) { clearInterval(elapsedTimerRef.current); elapsedTimerRef.current = null; }
  };

  // ── Poll session status ──
  const pollSession = (sid) => {
    const interval = setInterval(async () => {
      try {
        const resp = await fetch(`/api/v1/ingest/sessions/${sid}`);
        if (!resp.ok) return;
        const data = await resp.json();
        setProgress({ total: data.files_total, processed: data.files_processed });
        if (data.files && data.files.length > 0) setFiles(data.files);
        if (data.message) setProcessMsg(data.message);
        if (data.status === 'ready_for_review' || data.status === 'failed') {
          clearInterval(interval);
          stopElapsedTimer();
          setProcessMsg('');
          setDocuments(data.documents || []);
          setPhase(data.documents?.length > 0 ? 'preview' : 'upload');
          if (data.status === 'failed') showToast('处理失败 Processing failed', 'err');
          else if (data.documents?.length > 0) showToast(`提取了 ${data.documents.length} 条文档 — Extracted ${data.documents.length} documents`);
          else showToast('未提取到文档 No documents extracted', 'err');
        }
      } catch (_) {}
    }, 2000);
  };

  // ── Document editing ──
  const updateDoc = (idx, field, value) => {
    setDocuments(docs => docs.map(d => d.index === idx ? { ...d, [field]: value } : d));
  };
  const toggleAccept = (idx) => {
    setDocuments(docs => docs.map(d => d.index === idx ? { ...d, accepted: !d.accepted } : d));
  };
  const acceptAll = () => setDocuments(docs => docs.map(d => ({ ...d, accepted: true })));
  const rejectAll = () => setDocuments(docs => docs.map(d => ({ ...d, accepted: false })));
  const toggleExpand = (idx) => setExpanded(e => ({ ...e, [idx]: !e[idx] }));

  // ── Commit ──
  const handleCommit = async () => {
    if (!sessionId) return;
    setLoading(true);
    setPhase('committing');

    // Sync local edits to server with per-document progress
    const total = documents.length;
    setCommitProgress({ current: 0, total, phase: 'syncing' });
    for (let i = 0; i < documents.length; i++) {
      const doc = documents[i];
      try {
        await fetch(`/api/v1/ingest/sessions/${sessionId}/documents/${doc.index}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(doc),
        });
      } catch (_) {}
      setCommitProgress({ current: i + 1, total, phase: 'syncing' });
    }

    setCommitProgress({ current: total, total, phase: 'committing' });
    try {
      const resp = await fetch(`/api/v1/ingest/sessions/${sessionId}/commit`, { method: 'POST' });
      if (!resp.ok) throw new Error(`Commit failed: ${resp.status}`);
      const result = await resp.json();
      setCommitResult(result);
      setPhase('result');
      if (result.errors?.length > 0) {
        showToast(`已提交 ${result.committed} 条，${result.errors.length} 条错误 — ${result.committed} committed, ${result.errors.length} errors`, 'err');
      } else {
        showToast(`已提交 ${result.committed} 条 — Committed ${result.committed} documents`);
      }
      // Refresh stats
      fetch('/api/v1/documents/stats').then(r => r.json()).then(s => onStatsRefresh(s)).catch(() => {});
    } catch (err) {
      showToast(err.message, 'err');
      setPhase('preview');
    }
    setLoading(false);
  };

  const confClass = (c) => c >= 0.8 ? 'high' : c >= 0.5 ? 'med' : 'low';
  const acceptedCount = documents.filter(d => d.accepted).length;
  const rejectedCount = documents.length - acceptedCount;
  const docsWithEmptyRequired = documents.filter(d => d.accepted && (!d.project || !d.equipment));

  return (
    <div className="import-page">
      {toast && (
        <div className={`import-toast import-toast-${toast.kind}`}>
          <Icon name={toast.kind === 'err' ? 'info' : 'check'} size={14} />
          {toast.msg}
        </div>
      )}

      <div className="import-inner">

        {/* ── Phase: Upload ── */}
        {phase === 'upload' && (
          <section className="import-section">
            <div className="import-section-head">
              <h3 className="import-section-title">导入文件 · Import Files</h3>
            </div>
            <div
              className={`import-dropzone ${dragOver ? 'drag-over' : ''}`}
              onClick={() => fileInputRef.current?.click()}
              onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={(e) => { e.preventDefault(); setDragOver(false); handleFiles(e.dataTransfer.files); }}
            >
              <input
                ref={fileInputRef}
                type="file"
                multiple
                accept=".pdf,.xlsx,.xls,.csv,.pptx,.docx"
                style={{ display: 'none' }}
                onChange={(e) => handleFiles(e.target.files)}
              />
              <div className="import-dropzone-label">
                <Icon name="arrow-up" size={16} /> 拖拽文件到此处或点击选择
              </div>
              <div className="import-dropzone-hint">
                Drag & drop files here, or click to browse · PDF, XLSX, CSV, PPTX, DOCX
              </div>
            </div>

            <div className="import-hints">
              <div className="import-hint-field">
                <label>知识类型 Type</label>
                <select value={ktHint} onChange={e => setKtHint(e.target.value)}>
                  <option value="">自动检测 Auto-detect</option>
                  <option value="alarm">报警 Alarm</option>
                  <option value="setup">调试 Setup</option>
                  <option value="experience">经验 Experience</option>
                </select>
              </div>
              <div className="import-hint-field">
                <label>项目 Project</label>
                <select value={projHint} onChange={e => setProjHint(e.target.value)}>
                  <option value="">—</option>
                  {(taxonomy?.projects || []).map(p => <option key={p} value={p}>{p}</option>)}
                </select>
              </div>
              <div className="import-hint-field">
                <label>机台 Equipment</label>
                <select value={equipHint} onChange={e => setEquipHint(e.target.value)}>
                  <option value="">—</option>
                  {(taxonomy?.equipment || []).map(e => <option key={e} value={e}>{e}</option>)}
                </select>
              </div>
            </div>

            <div className="import-folder-row">
              <div className="import-hint-field" style={{ flex: 1 }}>
                <label>或扫描服务器目录 Or scan server folder</label>
                <input
                  type="text"
                  placeholder="/data/import_files"
                  value={folderPath}
                  onChange={e => setFolderPath(e.target.value)}
                />
              </div>
              <button
                className="btn btn-primary btn-sm"
                onClick={handleScan}
                disabled={!folderPath.trim() || loading}
                style={{ marginBottom: '1px' }}
              >
                {loading ? '扫描中…' : '扫描 Scan'}
              </button>
            </div>
          </section>
        )}

        {/* ── Phase: Processing ── */}
        {phase === 'processing' && (
          <section className="import-section">
            <div className="import-section-head">
              <h3 className="import-section-title">处理中 · Processing</h3>
            </div>
            <div className="import-progress">
              <div className={`import-progress-bar ${progress.processed === 0 ? 'indeterminate' : ''}`}>
                <div
                  className="import-progress-fill"
                  style={{ width: progress.total > 0 && progress.processed > 0 ? `${(progress.processed / progress.total) * 100}%` : '0%' }}
                />
              </div>
              <div className="import-progress-row">
                <span className="import-progress-text">
                  {progress.processed} / {progress.total} 文件已处理 · files processed
                </span>
                {elapsed > 0 && (
                  <span className="import-progress-elapsed">
                    {elapsed < 60 ? `${elapsed}s` : `${Math.floor(elapsed / 60)}m ${elapsed % 60}s`}
                  </span>
                )}
              </div>
              {processMsg && (
                <div className="import-step-msg">
                  <div className="kb-spinner" style={{ width: 12, height: 12, borderWidth: 1.5 }} />
                  {processMsg}
                </div>
              )}
              {elapsed > 90 && progress.processed === 0 && (
                <div style={{ fontSize: '11.5px', color: 'var(--loose)', marginTop: 8 }}>
                  AI analysis of large documents can take several minutes — please keep this tab open.
                </div>
              )}
            </div>
            <ul className="import-file-list">
              {files.map((f, i) => (
                <li key={i} className="import-file-item">
                  <span className="import-file-name">{f.file_name}</span>
                  {f.status === 'processing' && f.message && (
                    <span className="import-file-step">{f.message}</span>
                  )}
                  <span className={`import-file-status ${f.status === 'done' ? 'ok' : f.status === 'skipped_duplicate' ? 'skip' : f.status === 'failed' ? 'err' : ''}`}>
                    {f.status === 'processing' ? (
                      <span className="kb-spinner" style={{ width: 12, height: 12, borderWidth: 1.5, display: 'inline-block' }} />
                    ) : f.status === 'done' ? '✓' : f.status === 'skipped_duplicate' ? 'Skipped' : f.status === 'failed' ? '✗' : f.status}
                  </span>
                </li>
              ))}
            </ul>
          </section>
        )}

        {/* ── Phase: Committing ── */}
        {phase === 'committing' && (
          <section className="import-section">
            <div className="import-section-head">
              <h3 className="import-section-title">提交中 · Committing</h3>
            </div>
            <div className="import-progress">
              <div className={`import-progress-bar ${commitProgress.phase === 'committing' ? 'indeterminate' : ''}`}>
                <div
                  className="import-progress-fill"
                  style={{ width: commitProgress.total > 0 ? `${(commitProgress.current / commitProgress.total) * 100}%` : '0%' }}
                />
              </div>
              <div className="import-progress-row">
                <span className="import-progress-text">
                  {commitProgress.phase === 'syncing'
                    ? `同步编辑 ${commitProgress.current} / ${commitProgress.total} · Syncing edits`
                    : '写入数据库中… · Writing to database…'}
                </span>
              </div>
              <div className="import-step-msg">
                <div className="kb-spinner" style={{ width: 12, height: 12, borderWidth: 1.5 }} />
                {commitProgress.phase === 'syncing' ? '正在同步文档编辑… Syncing document edits…' : '正在提交到知识库… Committing to knowledge base…'}
              </div>
            </div>
          </section>
        )}

        {/* ── Phase: Preview ── */}
        {phase === 'preview' && (
          <section className="import-section">
            <div className="import-section-head">
              <h3 className="import-section-title">预览 · Preview ({documents.length} 条文档)</h3>
              <div className="import-bulk-actions">
                <button className="btn btn-sm" onClick={acceptAll}>全部接受 Accept All</button>
                <button className="btn btn-sm" onClick={rejectAll}>全部拒绝 Reject All</button>
              </div>
            </div>

            {docsWithEmptyRequired.length > 0 && (
              <div style={{ padding: '10px 14px', borderRadius: 'var(--radius)', background: 'color-mix(in oklab, var(--loose) 10%, var(--surface))', border: '1px solid color-mix(in oklab, var(--loose) 30%, var(--border))', fontSize: '12.5px', color: 'var(--loose)', marginBottom: 12 }}>
                ⚠ {docsWithEmptyRequired.length} 条已接受文档缺少 项目/机台 字段，提交时将跳过。请在下方填写或取消选中。
                <span style={{ display: 'block', marginTop: 2, color: 'var(--ink-2)' }}>
                  {docsWithEmptyRequired.length} accepted document(s) have empty Project / Equipment — they will fail on commit unless filled in or unchecked.
                </span>
              </div>
            )}

            <div className="import-doc-cards">
              {documents.map(doc => {
                const isExpanded = expanded[doc.index];
                const typeLabel = doc.knowledge_type === 'alarm' ? '报警' : doc.knowledge_type === 'setup' ? '调试' : '经验';
                const missingFields = (!doc.project ? ['项目 Project'] : []).concat(!doc.equipment ? ['机台 Equipment'] : []);
                return (
                  <div key={doc.index} className={`import-doc-card ${!doc.accepted ? 'rejected' : ''}`}>
                    <div className="import-doc-head" onClick={() => toggleExpand(doc.index)}>
                      <input
                        type="checkbox"
                        checked={doc.accepted}
                        onChange={(e) => { e.stopPropagation(); toggleAccept(doc.index); }}
                      />
                      <span className={`import-doc-conf ${confClass(doc.confidence)}`}>
                        {Math.round(doc.confidence * 100)}%
                      </span>
                      <span className="import-doc-title">
                        [{typeLabel}] {doc.title || '(无标题)'}
                      </span>
                      {doc.accepted && missingFields.length > 0 && (
                        <span title={`Missing: ${missingFields.join(', ')}`} style={{ fontSize: '11px', padding: '1px 6px', borderRadius: 8, background: 'color-mix(in oklab, var(--loose) 15%, var(--surface))', color: 'var(--loose)', flexShrink: 0 }}>
                          ⚠ {missingFields.join(' · ')}
                        </span>
                      )}
                      <span style={{ fontSize: '11px', color: 'var(--muted)' }}>
                        {doc.source_file}
                        {doc.error_codes?.length > 0 && ` · ${doc.error_codes.join(', ')}`}
                      </span>
                      <Icon name={isExpanded ? 'chevron-up' : 'chevron-down'} size={14} />
                    </div>

                    {isExpanded && (
                      <div className="import-doc-body">
                        <div className="import-doc-field">
                          <label>知识类型 Type</label>
                          <select value={doc.knowledge_type} onChange={e => updateDoc(doc.index, 'knowledge_type', e.target.value)}>
                            <option value="alarm">报警 Alarm</option>
                            <option value="setup">调试 Setup</option>
                            <option value="experience">经验 Experience</option>
                          </select>
                        </div>
                        <div style={{ display: 'flex', gap: '12px' }}>
                          <div className="import-doc-field" style={{ flex: 1 }}>
                            <label>项目 Project</label>
                            <select value={doc.project} onChange={e => updateDoc(doc.index, 'project', e.target.value)} style={!doc.project ? { borderColor: 'var(--loose)' } : {}}>
                              <option value="">— (留空将导致提交失败 / leave blank → commit error)</option>
                              {(taxonomy?.projects || []).map(p => <option key={p} value={p}>{p}</option>)}
                            </select>
                          </div>
                          <div className="import-doc-field" style={{ flex: 1 }}>
                            <label>机台 Equipment</label>
                            <select value={doc.equipment} onChange={e => updateDoc(doc.index, 'equipment', e.target.value)} style={!doc.equipment ? { borderColor: 'var(--loose)' } : {}}>
                              <option value="">— (留空将导致提交失败 / leave blank → commit error)</option>
                              {(taxonomy?.equipment || []).map(e => <option key={e} value={e}>{e}</option>)}
                            </select>
                          </div>
                        </div>
                        <div className="import-doc-field">
                          <label>标题 Title</label>
                          <input value={doc.title} onChange={e => updateDoc(doc.index, 'title', e.target.value)} />
                        </div>
                        {doc.knowledge_type === 'alarm' && (
                          <>
                            <div className="import-doc-field">
                              <label>报警代码 Error Codes (逗号分隔)</label>
                              <input value={(doc.error_codes || []).join(', ')} onChange={e => updateDoc(doc.index, 'error_codes', e.target.value.split(',').map(s => s.trim()).filter(Boolean))} />
                            </div>
                            <div className="import-doc-field">
                              <label>内容 Content</label>
                              <textarea rows={3} value={doc.content} onChange={e => updateDoc(doc.index, 'content', e.target.value)} />
                            </div>
                            <div className="import-doc-field">
                              <label>解除流程 Resolution</label>
                              <textarea rows={3} value={doc.resolution} onChange={e => updateDoc(doc.index, 'resolution', e.target.value)} />
                            </div>
                          </>
                        )}
                        {doc.knowledge_type === 'setup' && (
                          <>
                            <div className="import-doc-field">
                              <label>规格/要求 Prerequisites</label>
                              <textarea rows={2} value={doc.prerequisites} onChange={e => updateDoc(doc.index, 'prerequisites', e.target.value)} />
                            </div>
                            <div className="import-doc-field">
                              <label>调试步骤 Procedure</label>
                              <textarea rows={3} value={doc.procedure} onChange={e => updateDoc(doc.index, 'procedure', e.target.value)} />
                            </div>
                          </>
                        )}
                        {doc.knowledge_type === 'experience' && (
                          <>
                            <div className="import-doc-field">
                              <label>内容 Body</label>
                              <textarea rows={3} value={doc.body_text} onChange={e => updateDoc(doc.index, 'body_text', e.target.value)} />
                            </div>
                            <div className="import-doc-field">
                              <label>流程 Procedure</label>
                              <textarea rows={2} value={doc.procedure} onChange={e => updateDoc(doc.index, 'procedure', e.target.value)} />
                            </div>
                          </>
                        )}
                        <div className="import-doc-field">
                          <label>注意事项 Notes</label>
                          <textarea rows={2} value={doc.notes} onChange={e => updateDoc(doc.index, 'notes', e.target.value)} />
                        </div>

                        {doc.warnings?.length > 0 && (
                          <div className="import-warnings">
                            {doc.warnings.map((w, i) => <span key={i} className="import-warning-badge">{w}</span>)}
                          </div>
                        )}

                        {doc.raw_text_excerpt && (
                          <details className="import-doc-raw">
                            <summary>原始文本 Raw Text</summary>
                            <pre>{doc.raw_text_excerpt}</pre>
                          </details>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            <div className="import-commit-bar">
              <div style={{ display: 'flex', flex: 1, flexDirection: 'column', gap: 4 }}>
                <div className="import-commit-summary">
                  接受 {acceptedCount} 条 · 拒绝 {rejectedCount} 条 — {acceptedCount} accepted · {rejectedCount} rejected
                </div>
                {docsWithEmptyRequired.length > 0 && (
                  <div style={{ fontSize: '11.5px', color: 'var(--loose)' }}>
                    ⚠ {docsWithEmptyRequired.length} 条缺少项目/机台，提交将部分失败 · {docsWithEmptyRequired.length} missing project/equipment — will error on commit
                  </div>
                )}
              </div>
              <div style={{ display: 'flex', gap: '8px', flexShrink: 0 }}>
                <button className="btn btn-sm" onClick={() => { setPhase('upload'); setDocuments([]); setSessionId(null); }}>
                  返回 Back
                </button>
                <button className="btn btn-primary" onClick={handleCommit} disabled={acceptedCount === 0 || loading}>
                  提交 {acceptedCount} 条 · Commit
                </button>
              </div>
            </div>
          </section>
        )}

        {/* ── Phase: Result ── */}
        {phase === 'result' && commitResult && (
          <section className="import-section">
            <div className="import-result">
              <div className="import-result-num">{commitResult.committed}</div>
              <div className="import-result-label">条文档已提交 documents committed</div>
              {commitResult.skipped > 0 && (
                <div className="import-result-label" style={{ marginTop: '8px' }}>
                  跳过 {commitResult.skipped} 条 · {commitResult.skipped} skipped
                </div>
              )}
              {commitResult.errors?.length > 0 && (
                <div style={{ marginTop: '12px', textAlign: 'left', background: 'color-mix(in oklab, var(--danger) 6%, var(--surface))', border: '1px solid color-mix(in oklab, var(--danger) 25%, var(--border))', borderRadius: 'var(--radius)', padding: '10px 14px' }}>
                  <div style={{ fontSize: '12px', color: 'var(--danger)', fontWeight: 600, marginBottom: 6 }}>
                    {commitResult.errors.length} 条提交失败 · {commitResult.errors.length} document(s) failed
                  </div>
                  {commitResult.errors.map((e, i) => (
                    <div key={i} style={{ fontSize: '12px', color: 'var(--danger)', marginTop: 4, display: 'flex', gap: 6 }}>
                      <span style={{ fontWeight: 500, flexShrink: 0 }}>#{e.index}{e.title ? ` "${e.title}"` : ''}:</span>
                      <span>{e.error}</span>
                    </div>
                  ))}
                </div>
              )}
              <button
                className="btn btn-primary"
                style={{ marginTop: '24px' }}
                onClick={() => { setPhase('upload'); setDocuments([]); setSessionId(null); setCommitResult(null); }}
              >
                继续导入 Import More
              </button>
            </div>
          </section>
        )}
      </div>
    </div>
  );
}

function AdminPage({ stats, onStatsRefresh }) {
  const typeDefs = window.KB_TYPE_DEFS || {};
  const [statsData, setStatsData]       = React.useState(stats);
  const [statsLoading, setStatsLoading] = React.useState(false);
  const [toast, setToast]               = React.useState(null);

  const showToast = (msg, kind = 'ok') => {
    setToast({ msg, kind });
    setTimeout(() => setToast(null), 3000);
  };
  const reloadStats = () => {
    setStatsLoading(true);
    fetch('/api/v1/documents/stats').then(r => r.json()).then(s => {
      setStatsData(s); onStatsRefresh(s); setStatsLoading(false);
    }).catch(() => setStatsLoading(false));
  };
  const reloadTaxonomy = () => {
    fetch('/api/v1/admin/reload-taxonomy', { method: 'POST' })
      .then(r => r.ok ? showToast('分类已重新加载 Taxonomy reloaded') : showToast('重载失败 Reload failed', 'err'))
      .catch(() => showToast('网络错误 Network error', 'err'));
  };

  const [formType, setFormType]     = React.useState(null);
  const [formValues, setFormValues] = React.useState({});
  const [formErrors, setFormErrors] = React.useState({});
  const [submitting, setSubmitting] = React.useState(false);
  const [lastDocId, setLastDocId]   = React.useState(null);

  const selectType = (kt) => { setFormType(kt); setFormValues({}); setFormErrors({}); setLastDocId(null); };
  const setField = (key, val) => {
    setFormValues(v => ({ ...v, [key]: val }));
    setFormErrors(e => ({ ...e, [key]: null }));
  };
  const validateForm = () => {
    const errs = {};
    (ADMIN_FIELDS[formType] || []).forEach(f => {
      if (f.required && !(formValues[f.key] || '').trim()) errs[f.key] = '必填 Required';
    });
    setFormErrors(errs);
    return Object.keys(errs).length === 0;
  };
  const submitForm = () => {
    if (!validateForm()) return;
    setSubmitting(true);
    const payload = { ...formValues };
    payload.error_codes = payload.error_codes
      ? payload.error_codes.split(',').map(s => s.trim()).filter(Boolean)
      : [];
    fetch(`/api/v1/documents/${formType}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    })
      .then(r => r.json().then(d => ({ ok: r.ok, data: d })))
      .then(({ ok, data }) => {
        setSubmitting(false);
        if (ok) { setLastDocId(data.id); setFormValues({}); showToast(`已添加 · ID: ${data.id}`); }
        else showToast(JSON.stringify(data.detail || data), 'err');
      })
      .catch(() => { setSubmitting(false); showToast('提交失败 Submit failed', 'err'); });
  };

  const liveStats = statsData || stats || {};
  const fields = ADMIN_FIELDS[formType] || [];

  return (
    <div className="admin-page">
      {toast && (
        <div className={`admin-toast admin-toast-${toast.kind}`}>
          <Icon name={toast.kind === 'err' ? 'info' : 'check'} size={14} />
          {toast.msg}
        </div>
      )}
      <div className="admin-inner">
        <section className="admin-section">
          <div className="admin-section-head">
            <h3 className="admin-section-title">统计 · Stats</h3>
            <button className="btn btn-sm" onClick={reloadStats} disabled={statsLoading}>
              {statsLoading ? '加载中…' : '刷新'}
            </button>
          </div>
          <div className="admin-stats-grid">
            <div className="admin-stat-card">
              <div className="admin-stat-num">{liveStats.total || 0}</div>
              <div className="admin-stat-label">总文档 Total</div>
            </div>
            {Object.entries(liveStats.by_type || {}).map(([k, v]) => (
              <div key={k} className="admin-stat-card">
                <div className="admin-stat-num">{v}</div>
                <div className="admin-stat-label">{typeDefs[k]?.zh || k}</div>
              </div>
            ))}
          </div>
        </section>

        <section className="admin-section">
          <div className="admin-section-head">
            <h3 className="admin-section-title">操作 · Actions</h3>
          </div>
          <div className="admin-actions">
            <button className="btn" onClick={reloadTaxonomy}>
              <Icon name="sparkle" size={13} /> 重新加载分类 Reload Taxonomy
            </button>
          </div>
        </section>

        <section className="admin-section">
          <div className="admin-section-head">
            <h3 className="admin-section-title">添加知识 · Add Knowledge</h3>
          </div>
          <div className="admin-type-pills">
            {['alarm', 'setup', 'experience'].map(kt => (
              <button key={kt}
                className={`admin-type-pill ${formType === kt ? 'admin-type-pill-on' : ''}`}
                onClick={() => selectType(kt)}>
                <Icon name={typeIconMap[kt]} size={13} />
                {typeDefs[kt]?.zh || kt}
              </button>
            ))}
          </div>
          {formType && (
            <div className="admin-form">
              {fields.map(f => (
                <div key={f.key} className="admin-field">
                  <label className="admin-label">
                    {f.label}{f.required && <span className="admin-required">*</span>}
                  </label>
                  {f.type === 'textarea'
                    ? <textarea
                        className={`admin-input admin-textarea ${formErrors[f.key] ? 'admin-input-err' : ''}`}
                        value={formValues[f.key] || ''}
                        onChange={e => setField(f.key, e.target.value)}
                        rows={4}
                      />
                    : <input
                        className={`admin-input ${formErrors[f.key] ? 'admin-input-err' : ''}`}
                        type="text"
                        value={formValues[f.key] || ''}
                        onChange={e => setField(f.key, e.target.value)}
                      />
                  }
                  {formErrors[f.key] && <span className="admin-field-err">{formErrors[f.key]}</span>}
                </div>
              ))}
              <div className="admin-form-foot">
                {lastDocId && (
                  <span className="admin-success">
                    <Icon name="check" size={13} /> 已添加 ID: <span className="mono">{lastDocId}</span>
                  </span>
                )}
                <button className="btn btn-primary" onClick={submitForm} disabled={submitting}>
                  {submitting ? '提交中…' : '提交 Submit'}
                </button>
              </div>
            </div>
          )}
        </section>
      </div>
    </div>
  );
}

// --- AI Chat panel (backend-proxied, key stays server-side)

function AIChatPanel({ context, results, onClose, onOpenDoc }) {
  const [messages, setMessages]   = aUs([]);
  const [input, setInput]         = aUs('');
  const [loading, setLoading]     = aUs(false);
  const [panelSize, setPanelSize] = aUs({ w: 420, h: 560 });
  const [showQuickshots, setShowQuickshots] = aUs(false);
  const [accumParams, setAccumParams] = aUs({ project: null, equipment: null, type: null, code: null, keywords: [] });
  const bottomRef = React.useRef(null);
  const inputRef  = React.useRef(null);

  const suggestions = aMemo(() => [
    '真空系统报警如何处理？',
    '设备维护的注意事项有哪些？',
    '如何校准设备参数？',
    '常见报警代码汇总',
  ], []);

  aUe(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  const sendMessage = async (text) => {
    if (!text || loading) return;
    const userMsg = { role: 'user', content: text };
    const history = [...messages, userMsg];
    setMessages(history);
    setInput('');
    setLoading(true);

    try {
      const apiMessages = history
        .filter(m => m.content && typeof m.content === 'string' && m.content.trim())
        .map(m => ({ role: m.role, content: m.content }));

      const resp = await fetch('/api/v1/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: apiMessages }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${resp.status}`);
      }
      const data = await resp.json();

      if (data.effective_params) {
        setAccumParams({
          project:   data.effective_params.project || null,
          equipment: data.effective_params.equipment || null,
          type:      data.effective_params.knowledge_type || null,
          code:      data.effective_params.error_codes?.[0] || null,
          keywords:  data.effective_params.keywords || [],
        });
      }

      const reply = data.content || '（无回复）';
      const searchHits = data.search_results || [];

      if (searchHits.length > 0) {
        const ss = data.search_status || '';
        const isStrict = ss === 'strict_hit';
        const banner = isStrict ? '完全匹配'
          : ss === 'vector_only' ? '语义相关（低置信度，仅供参考）'
          : ss === 'loose_hit' ? '不完全匹配，仅供参考' : '';
        setMessages(m => [...m, {
          role: 'assistant', kind: 'search_answer', content: reply,
          banner, bannerKind: isStrict ? 'full' : 'partial',
          hits: searchHits.slice(0, 5).map(h => hitToDoc(h, [])),
        }]);
      } else {
        setMessages(m => [...m, { role: 'assistant', kind: 'text', content: reply }]);
      }
    } catch (err) {
      setMessages(m => [...m, { role: 'assistant', kind: 'text', content: `⚠ ${err.message}` }]);
    }
    setLoading(false);
    setTimeout(() => inputRef.current?.focus(), 50);
  };

  const resetSearch = () => {
    setAccumParams({ project: null, equipment: null, type: null, code: null, keywords: [] });
    setMessages([]);
  };

  const send = () => {
    const t = input.trim();
    if (t) sendMessage(t);
  };

  // Drag-to-resize from the top-left handle
  const onResizeStart = (e) => {
    e.preventDefault();
    const startX = e.clientX, startY = e.clientY;
    const startW = panelSize.w, startH = panelSize.h;
    const onMove = (me) => {
      setPanelSize({
        w: Math.max(280, Math.min(700, startW + (startX - me.clientX))),
        h: Math.max(320, Math.min(860, startH + (startY - me.clientY))),
      });
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };

  const typeDefs = window.KB_TYPE_DEFS || {};
  const hasAccumParams = !!(accumParams.project || accumParams.equipment || accumParams.type || accumParams.code || (accumParams.keywords && accumParams.keywords.length > 0));

  return (
    <div className="chat-panel" style={{ width: panelSize.w, height: panelSize.h }}>
      <div className="chat-resize-handle" onMouseDown={onResizeStart} title="拖动调整大小 Drag to resize" />
      <div className="chat-head">
        <span className="chat-head-title">
          <Icon name="sparkle" size={14} />
          AI 助手 · Assistant
        </span>
        <div style={{ display: 'flex', gap: 4 }}>
          {messages.length > 0 && (
            <button className="icon-btn" onClick={resetSearch} title="新对话 · New chat" aria-label="new chat">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 5v14M5 12h14"/>
              </svg>
            </button>
          )}
          <button className="icon-btn" onClick={onClose} aria-label="close chat">
            <Icon name="x" size={16} />
          </button>
        </div>
      </div>

      {hasAccumParams && (
      <div className="chat-params-bar">
        <span style={{ color: 'var(--ink-2)', flexShrink: 0 }}>已识别：</span>
        {accumParams.project   && <span className="chat-params-chip">项目 {accumParams.project}</span>}
        {accumParams.equipment && <span className="chat-params-chip">机台 {accumParams.equipment}</span>}
        {accumParams.type      && <span className="chat-params-chip">{typeDefs[accumParams.type]?.zh || accumParams.type}</span>}
        {accumParams.code      && <span className="chat-params-chip">代码 {accumParams.code}</span>}
        {accumParams.keywords && accumParams.keywords.length > 0
          && <span className="chat-params-chip">关键词 {accumParams.keywords.join(' / ')}</span>}
        <button className="chat-params-reset" onClick={resetSearch} title="清空参数并重新开始">重置</button>
      </div>
      )}

      {context && !hasAccumParams && messages.length === 0 && (
        <div className="chat-params-bar" style={{ fontSize: '11px', color: 'var(--muted)' }}>
          <Icon name="search" size={11} />
          <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{context}</span>
        </div>
      )}

      <div className="chat-messages">
        {messages.length === 0 && (
          <>
            <div className="chat-empty">
              <Icon name="sparkle" size={22} />
              <p>您好，我会通过对话帮您检索知识库并回答问题。</p>
              <p style={{ opacity: .7, fontSize: '11.5px' }}>
                告诉我设备/机台、项目或报警代码，例如：<br/>
                「FTU 的 125002 报警怎么处理」或「LCD setup」
              </p>
            </div>
            <div className="chat-suggestions">
              <div className="chat-suggestions-label">快速提问 Quick questions</div>
              {suggestions.map((s, i) => (
                <button key={i} className="chat-suggestion-chip" onClick={() => sendMessage(s)}>
                  <Icon name="arrow-right" size={12} />
                  {s}
                </button>
              ))}
            </div>
          </>
        )}
        {messages.map((m, i) => {
          if (m.kind === 'search_answer') {
            return (
              <div key={i} className="chat-msg chat-msg-assistant" style={{ maxWidth: '96%' }}>
                <div className="chat-msg-content chat-md" dangerouslySetInnerHTML={{ __html: window.marked ? window.marked.parse(m.content) : m.content }} />
                {m.hits && m.hits.length > 0 && (
                  <div style={{ padding: '0 2px', marginTop: 6 }}>
                    <div className={`chat-result-banner${m.bannerKind === 'partial' ? ' partial' : ''}`}>
                      {m.banner} · {m.hits.length} 条结果
                    </div>
                    {m.hits.map((h, j) => (
                      <div key={j} className="chat-result-card" onClick={() => onOpenDoc && onOpenDoc(h.doc)}>
                        <div className="chat-result-title">{h.doc.title}</div>
                        <div className="chat-result-meta">
                          {h.doc.type      && <span>{typeDefs[h.doc.type]?.zh || h.doc.type}</span>}
                          {h.doc.project   && <span>· {h.doc.project}</span>}
                          {h.doc.equipment && <span>· {h.doc.equipment}</span>}
                          {h.doc.codes && h.doc.codes.length > 0 && <span>· {h.doc.codes.slice(0, 3).join(', ')}</span>}
                        </div>
                        {h.doc.summary && (
                          <div style={{ fontSize: '11px', color: 'var(--muted)', marginTop: 3, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                            {h.doc.summary}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          }
          return (
            <div key={i} className={`chat-msg chat-msg-${m.role}`}>
              {m.role === 'assistant'
                ? <div className="chat-msg-content chat-md" dangerouslySetInnerHTML={{ __html: window.marked ? window.marked.parse(m.content) : m.content }} />
                : <div className="chat-msg-content">{m.content}</div>
              }
            </div>
          );
        })}
        {loading && (
          <div className="chat-msg chat-msg-assistant">
            <div className="chat-msg-content chat-loading">
              <span /><span /><span />
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      <div className="chat-input-area">
        {messages.length > 0 && showQuickshots && (
          <div className="chat-quickshots">
            {suggestions.map((s, i) => (
              <button key={i} className="chat-quickshot-chip" onClick={() => { sendMessage(s); setShowQuickshots(false); }}>
                <Icon name="arrow-right" size={10} />{s}
              </button>
            ))}
          </div>
        )}
        <div className="chat-input-row">
          {messages.length > 0 && (
            <button
              className={`chat-hint-btn${showQuickshots ? ' active' : ''}`}
              title="快捷问题 / Quick questions"
              onClick={() => setShowQuickshots(s => !s)}
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10" /><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" /><path d="M12 17h.01" />
              </svg>
            </button>
          )}
          <input
            ref={inputRef}
            className="chat-input"
            placeholder={context ? "基于当前检索提问…" : "问一个问题… / Ask a question…"}
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
            disabled={loading}
            autoFocus
          />
          <button className="btn btn-primary btn-sm" onClick={send} disabled={!input.trim() || loading}>
            <Icon name="arrow-right" size={14} />
          </button>
        </div>
      </div>
    </div>
  );
}
// --- Root
function App() {
  const [t, setTweak] = useTweaks(/*EDITMODE-BEGIN*/{
    "accent": "#4F4FAE",
    "density": "comfortable",
    "matchMode": "strict",
    "paramDisplay": "chips"
  }/*EDITMODE-END*/);

  const [page, setPage]         = aUs("chat"); // chat-first by default
  const [params, setParams]     = aUs(null);
  const [openDoc, setOpenDoc]   = aUs(null);
  const [taxonomy, setTax]      = aUs(null);
  const [stats, setStats]       = aUs(null);
  const [chatOpen, setChatOpen] = aUs(false);
  const [chatResults, setChatResults] = aUs(null);

  // Load taxonomy + stats from ES on mount (loadKBData auto-falls-back on failure)
  aUe(() => {
    window.KB_LOAD && window.KB_LOAD().then(({ tax, stats }) => {
      setTax(tax);
      setStats(stats);
    });
  }, []);

  // Apply accent palette to root
  aUe(() => {
    const palette = {
      "#4F4FAE": { soft: "oklch(0.95 0.03 265)", on: "#fff" },
      "#4B5563": { soft: "oklch(0.94 0.01 240)", on: "#fff" },
      "#0F9F73": { soft: "oklch(0.95 0.04 160)", on: "#fff" },
      "#C68C26": { soft: "oklch(0.95 0.05 70)",  on: "#1a1a1a" },
    };
    const meta = palette[t.accent] || palette["#4F4FAE"];
    document.documentElement.style.setProperty("--accent", t.accent);
    document.documentElement.style.setProperty("--accent-soft", meta.soft);
    document.documentElement.style.setProperty("--on-accent", meta.on);
  }, [t.accent]);

  aUe(() => {
    document.documentElement.dataset.density = t.density;
  }, [t.density]);

  const submitQuery = async (q) => {
    const rulesBased = parseQuery(q);
    if (window.saveRecentSearch) window.saveRecentSearch(q, rulesBased.project, rulesBased.equipment);
    setParams(rulesBased);
    setPage("results");
    setOpenDoc(null);
    window.scrollTo(0, 0);
    try {
      const resp = await fetch('/api/v1/extract', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: q }),
        signal: AbortSignal.timeout(4000),
      });
      if (resp.ok) {
        const llm = await resp.json();
        setParams({
          project:    llm.project    || rulesBased.project,
          equipment:  llm.equipment  || rulesBased.equipment,
          code:       llm.error_codes?.[0] || rulesBased.code,
          type:       llm.knowledge_type   || rulesBased.type,
          keywords:   llm.keywords?.length ? llm.keywords : rulesBased.keywords,
          raw:        q,
          isSentence: llm.is_sentence ?? rulesBased.isSentence,
        });
      }
    } catch (_) {}
  };

  // Called by ChatHomePage when user wants to see all results in keyword search
  const switchToSearch = (chatAccum) => {
    if (chatAccum && (chatAccum.project || chatAccum.equipment || chatAccum.code ||
        chatAccum.type || chatAccum.keywords?.length)) {
      const p = {
        project:   chatAccum.project   || null,
        equipment: chatAccum.equipment || null,
        code:      chatAccum.code      || null,
        type:      chatAccum.type      || null,
        keywords:  chatAccum.keywords  || [],
        raw:       chatAccum.keywords?.join(' ') || chatAccum.equipment || chatAccum.project || '',
        isSentence: false,
      };
      setParams(p);
      setPage("results");
    } else {
      setPage("landing");
    }
    setOpenDoc(null);
    window.scrollTo(0, 0);
  };

  // Side-panel chat is only for non-chat pages (results, library, admin)
  const showChatFab = page !== "chat";

  return (
    <div className="app">
      <AppHeader
        onHome={() => { setPage("landing"); setParams(null); setOpenDoc(null); window.scrollTo(0, 0); }}
        onLibrary={() => { setPage("library"); setOpenDoc(null); window.scrollTo(0, 0); }}
        onAdmin={() => { setPage("admin"); setOpenDoc(null); window.scrollTo(0, 0); }}
        onImport={() => { setPage("import"); setOpenDoc(null); window.scrollTo(0, 0); }}
        onChat={() => { setPage("chat"); setOpenDoc(null); setChatOpen(false); window.scrollTo(0, 0); }}
        onSearch={() => { setPage("landing"); setParams(null); setOpenDoc(null); window.scrollTo(0, 0); }}
        page={page}
      />

      <div className="app-body">
        {page === "chat" ? (
          <ChatHomePage
            taxonomy={taxonomy}
            onSwitchToSearch={switchToSearch}
            onOpenDoc={(d) => setOpenDoc(d)}
          />
        ) : page === "landing" ? (
          <Landing
            taxonomy={taxonomy}
            stats={stats}
            onSubmit={submitQuery}
            onPickRecent={(r) => submitQuery(r.q)}
            onPickType={(tId) => {
              setParams({ project: null, equipment: null, code: null, type: tId, keywords: [], raw: `类型：${tId}` });
              setPage("results");
              window.scrollTo(0, 0);
            }}
          />
        ) : page === "library" ? (
          <LibraryPage taxonomy={taxonomy} stats={stats} density={t.density} onOpen={(d) => setOpenDoc(d)} />
        ) : page === "import" ? (
          <ImportPage taxonomy={taxonomy} onStatsRefresh={(s) => setStats(s)} />
        ) : page === "admin" ? (
          <AdminPage stats={stats} onStatsRefresh={(s) => setStats(s)} />
        ) : (
          <ResultsPage
            taxonomy={taxonomy}
            stats={stats}
            params={params}
            setParams={setParams}
            mode={t.matchMode}
            setMode={(m) => setTweak("matchMode", m)}
            paramDisplay={t.paramDisplay}
            density={t.density}
            onOpen={(d) => setOpenDoc(d)}
            onResultsChange={setChatResults}
            onBack={() => { setPage("landing"); setParams(null); setOpenDoc(null); window.scrollTo(0, 0); }}
          />
        )}
      </div>

      {openDoc ? (
        <Detail
          doc={openDoc}
          keywords={page === "results" && params ? params.keywords : []}
          onClose={() => setOpenDoc(null)}
        />
      ) : null}

      {/* Side-questions Chat FAB — only shown on non-chat pages */}
      {showChatFab && (
        <button
          className="chat-fab"
          title="问侧边问题 · Side questions"
          onClick={() => setChatOpen(o => !o)}
          aria-label={chatOpen ? "Close side chat" : "Open side chat"}
        >
          {chatOpen ? <Icon name="x" size={20} /> : <Icon name="sparkle" size={20} />}
        </button>
      )}
      {showChatFab && chatOpen && (
        <AIChatPanel
          context={
            page === 'results' && params
              ? `查询: ${params.raw || ''}${params.project ? ` · 项目: ${params.project}` : ''}${params.equipment ? ` · 机台: ${params.equipment}` : ''}${params.type ? ` · 类型: ${params.type}` : ''}`
              : null
          }
          results={chatResults}
          onClose={() => setChatOpen(false)}
          onOpenDoc={(d) => setOpenDoc(d)}
        />
      )}

      {/* Tweaks Panel */}
      <TweaksPanel title="Tweaks">
        <TweakSection label="主题 · Theme">
          <TweakColor
            label="Accent"
            value={t.accent}
            onChange={(v) => setTweak("accent", v)}
            options={["#4F4FAE", "#4B5563", "#0F9F73", "#C68C26"]}
          />
        </TweakSection>

        <TweakSection label="布局 · Layout">
          <TweakRadio
            label="Density"
            value={t.density}
            onChange={(v) => setTweak("density", v)}
            options={[
              { value: "comfortable", label: "Comfort" },
              { value: "compact",     label: "Compact" },
            ]}
          />
          <TweakRadio
            label="参数展示 Params"
            value={t.paramDisplay}
            onChange={(v) => setTweak("paramDisplay", v)}
            options={[
              { value: "chips",    label: "Chips" },
              { value: "sentence", label: "Sentence" },
            ]}
          />
        </TweakSection>

        <TweakSection label="检索模式 · Match">
          <TweakRadio
            label="Match mode"
            value={t.matchMode}
            onChange={(v) => setTweak("matchMode", v)}
            options={[
              { value: "strict", label: "Strict" },
              { value: "loose",  label: "Loose" },
            ]}
          />
          <div className="tweak-note">
            Loose mode demos the fallback state: keywords joined by OR, with a notice that AI did not find an exact match.
          </div>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
