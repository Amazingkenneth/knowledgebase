    padding:0;border:0;border-radius:6px;overflow:hidden;cursor:default;
    box-shadow:0 0 0 .5px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.06);
    transition:transform .12s cubic-bezier(.3,.7,.4,1),box-shadow .12s}
  .twk-chip:hover{transform:translateY(-1px);
    box-shadow:0 0 0 .5px rgba(0,0,0,.18),0 4px 10px rgba(0,0,0,.12)}
  .twk-chip[data-on="1"]{box-shadow:0 0 0 1.5px rgba(0,0,0,.85),
    0 2px 6px rgba(0,0,0,.15)}
  .twk-chip>span{position:absolute;top:0;bottom:0;right:0;width:34%;
    display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}
  .twk-chip>span>i{flex:1;box-shadow:0 -1px 0 rgba(0,0,0,.1)}
  .twk-chip>span>i:first-child{box-shadow:none}
  .twk-chip svg{position:absolute;top:6px;left:6px;width:13px;height:13px;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel">
// Main app: state machine across landing, results, disambiguation, detail.
// Also: a tiny rule-based "AI parser" that extracts params from a free-text query
// using the domain's enum lists (projects, equipment, codes, types).

const { useState: aUs, useEffect: aUe, useMemo: aMemo, useCallback: aCb } = React;

// --- The parser. Deterministic rule-based extractor using ES taxonomy enums.
function parseQuery(q) {
  const tax      = window.KB_TAXONOMY || {};
  const projects = tax.projects  || [];
  const equips   = tax.equipment || [];
  const text  = q;
  const lower = q.toLowerCase();

  const project = projects.find((p) => text.includes(p)) || null;
  const equip   = equips.find((e) => lower.includes(e.toLowerCase())) || null;

  // codes: numeric 5-7 digit alarms, or alphanumeric forms like ERR-115, SP-0421
  let code = null;
  const codeMatch = text.match(/\b([A-Z]{1,4}[-_]?\d{3,7}|\d{5,7})\b/);
  if (codeMatch) code = codeMatch[1];

  // Detect natural-language / question-form queries — skip type forcing to avoid over-constraining
  const isSentence = /如何|怎么|怎样|是什么|什么是|是否|为什么|为何|多少|[？?]/.test(text);

  // type — keyword heuristics; disabled for sentence queries
  let type = null;
  if (!isSentence) {
    if (/报警|alarm|error|err|代码|code/i.test(text)) type = "alarm";
    else if (/setup|装夹|安装|配置|校准|calibrat/i.test(text)) type = "setup";
    else if (/经验|漂移|抖动|不均|chatter|drift|wobble|uneven/i.test(text)) type = "experience";
  }

  // keywords: strip matched tokens, extract CJK runs ≥2 and Latin words ≥3
  let remainder = text;
  [project, equip, code].forEach((tok) => {
    if (tok) remainder = remainder.split(tok).join(" ");
  });
  remainder = remainder
    .replace(/怎么处理|如何处理|怎么办|是什么|什么是|的处理|的解决|的方法|如何|怎么|怎样|是否|为什么|为何/g, " ")
    .replace(/解决|处理|操作|使用|查看|检查|修复|修改|设置|配置|校准|验证|确认|原因|步骤|方法|流程|注意/g, " ")
    .replace(/[，。？！,.?!:;:：；()（）"'""]/g, " ");

  // Generic category suffixes common in manufacturing alarm queries.
  // When a compound contains one of these as the tail bigram, only keep the head.
  const GENERIC_TAIL = new Set(["\u62a5\u8b66", "\u6545\u969c", "\u5931\u8d25", "\u9519\u8bef", "\u5f02\u5e38", "\u95ee\u9898", "\u62a5\u9519", "\u8b66\u544a"]);
  const tokens = [];
  const cjk = remainder.match(/[\u4e00-\u9fff]+/g) || [];
  cjk.forEach((c) => {
    if (isSentence && c.length >= 4) {
      // For sentence queries with compound CJK terms (e.g. "\u771f\u7a7a\u62a5\u8b66"):
      // prefer the subject/noun head (first bigram) for precision. If the tail bigram is
      // a generic category word (\u62a5\u8b66/\u6545\u969c/\u2026) we skip it to avoid over-broad BM25 matches.
      for (let i = 0; i + 2 <= c.length; i += 2) {
        const bigram = c.slice(i, i + 2);
        if (!GENERIC_TAIL.has(bigram)) tokens.push(bigram);
      }
      // Always include at least the first bigram as a fallback
      if (tokens.length === 0 || !tokens.includes(c.slice(0, 2))) tokens.push(c.slice(0, 2));
    } else if (c.length >= 2) {
      tokens.push(c);
    }
  });
  const latin = remainder.match(/[A-Za-z][A-Za-z0-9\-_]{2,}/g) || [];
  latin.forEach((w) => {
    if (!projects.includes(w) && !equips.includes(w)) tokens.push(w);
  });

  const seen = new Set();
  const keywords = [];
  tokens.forEach((t) => {
    const k = t.toLowerCase();
    if (!seen.has(k)) { seen.add(k); keywords.push(t); }
  });

  return { project, equipment: equip, code, type, keywords: keywords.slice(0, 5), raw: q, isSentence };
}

// --- Header app shell
function AppHeader({ onHome, onLibrary, onAdmin, page }) {
  return (
    <header className="app-header">
      <button className="brand" onClick={onHome}>
        <span className="brand-mark">
          <svg viewBox="0 0 16 16" width="14" height="14">
            <rect x="1" y="1" width="6" height="6" fill="currentColor" />
            <rect x="9" y="1" width="6" height="6" fill="currentColor" opacity="0.4" />
            <rect x="1" y="9" width="6" height="6" fill="currentColor" opacity="0.4" />
            <rect x="9" y="9" width="6" height="6" fill="currentColor" />
          </svg>
        </span>
        <span className="brand-name">
          <span className="brand-zh">索 · Sou</span>
          <span className="brand-en">Knowledge Base Search</span>
        </span>
      </button>

      <nav className="header-nav">
        <button className={`nav-item ${page === "landing" ? "nav-active" : ""}`} onClick={onHome}>
          检索 <span className="nav-en">Search</span>
        </button>
        <button className={`nav-item ${page === "library" ? "nav-active" : ""}`} onClick={onLibrary}>
          知识库 <span className="nav-en">Library</span>
        </button>
        <button className={`nav-item ${page === "admin" ? "nav-active" : ""}`} onClick={onAdmin}>
          管理 <span className="nav-en">Admin</span>
        </button>
      </nav>

      <div className="header-right">
        <button
          className="tweaks-toggle-btn"
          title="Tweaks panel (T)"
          onClick={() => window.postMessage({ type: "__activate_edit_mode" }, "*")}
          style={{
            display: "inline-flex", alignItems: "center", gap: "5px",
            padding: "5px 10px", borderRadius: "6px",
            background: "var(--surface-2)", border: "1px solid var(--border)",
            fontSize: "12px", color: "var(--ink-2)",
          }}

// --- Results page (filters sidebar + grid) — async, backed by ES via FastAPI
function ResultsPage({ taxonomy, stats, params, setParams, mode, setMode, paramDisplay, density, onOpen, onResultsChange }) {
  const typeDefs = window.KB_TYPE_DEFS || {};

  // Async search state
  const [result, setResult]   = rsUse(null);
  const [loading, setLoading] = rsUse(false);
  const [error, setError]     = rsUse(null);

  rsEff(() => {
    if (!params) return;
    setLoading(true);
    setError(null);
    window.KB_SEARCH(params, mode).then(r => {
      setResult(r);
      onResultsChange && onResultsChange(r);
      setLoading(false);
    }).catch(err => {
      setError(err.message);
      setLoading(false);
    });
  }, [params, mode]);

  const [editingQuery, setEditingQuery] = rsUse(false);
  const [editText, setEditText]         = rsUse(params.raw || "");

  const submitEdit = () => {
    if (!editText.trim()) return;
    setParams(parseQuery(editText.trim()));
    setEditingQuery(false);
  };

  // Sidebar facet data from pre-loaded stats (total counts, not filtered)
  const kts       = taxonomy?.knowledge_types || [];
  const projects  = taxonomy?.projects        || [];
  const equipment = taxonomy?.equipment       || [];
  const byProject  = stats?.by_project  || {};
  const byEquip    = stats?.by_equipment || {};
  const byType     = stats?.by_type     || {};

  // Interpret search result
  const hits         = result?.hits       || [];
  const total        = result?.total      || 0;
  const searchStatus = result?.status     || null;
  const isLoose      = searchStatus === 'loose_hit' || searchStatus === 'vector_only';
  const isTooMany    = searchStatus === 'too_many';
  const isEmpty      = searchStatus === 'no_hit' || (!loading && result && hits.length === 0);

  return (
    <div className="results-page">
      {/* Top bar: search + AI parse */}
      <div className="results-topbar">
        <div className="results-search-row">
          {editingQuery ? (
            <form className="search-box search-box-inline"
                  onSubmit={(e) => { e.preventDefault(); submitEdit(); }}>
              <Icon name="search" size={16} />
              <input autoFocus value={editText}
                     onChange={(e) => setEditText(e.target.value)}
                     onKeyDown={(e) => e.key === "Escape" && setEditingQuery(false)} />
              <button type="submit" className="btn btn-primary btn-sm">重新解析</button>
            </form>
          ) : (
            <div className="search-box search-box-inline search-box-static"
                 onClick={() => { setEditText(params.raw || ""); setEditingQuery(true); }}>
              <Icon name="search" size={16} />
              <span className="search-query">{params.raw}</span>
              <span className="search-edit-hint">
                <Icon name="edit" size={12} /> 修改 / edit
              </span>
            </div>
          )}
        </div>
        <ParamStrip params={params} setParams={setParams} displayStyle={paramDisplay} />
      </div>

      <div className="results-main">
        {/* Filter sidebar */}
        <aside className="filter-side">
          <div className="filter-head">
            <Icon name="filter" size={13} />
            <span>筛选 · Filters</span>
          </div>

          <FilterGroup label="类型" labelEn="Type">
            {kts.map((kt) => (
              <FilterRow key={kt}
                active={params.type === kt}
                onClick={() => setParams({ ...params, type: params.type === kt ? null : kt })}
                label={typeDefs[kt]?.zh || kt}
                en={typeDefs[kt]?.en || kt}
                count={byType[kt] || 0}
                icon={typeIconMap[kt]}
              />
            ))}
          </FilterGroup>

          <FilterGroup label="项目" labelEn="Project">
            {projects.map((p) => (
              <FilterRow key={p}
                active={params.project === p}
                onClick={() => setParams({ ...params, project: params.project === p ? null : p })}
                label={p}
                count={byProject[p] || 0}
              />
            ))}
          </FilterGroup>

          <FilterGroup label="机台 / 设备" labelEn="Equipment">
            {equipment.map((eq) => (
              <FilterRow key={eq}
                active={params.equipment === eq}
                onClick={() => setParams({ ...params, equipment: params.equipment === eq ? null : eq })}
                label={eq}
                count={byEquip[eq] || 0}
              />
            ))}
          </FilterGroup>
        </aside>

        {/* Results body */}
        <main className="results-body">
          {loading ? (
            <div className="kb-loading">
              <div className="kb-spinner" />
              <span>检索中… Searching</span>
            </div>
          ) : error ? (
            <div style={{ padding: "40px 0", textAlign: "center", color: "var(--danger)", fontSize: 13 }}>
              检索失败：{error}
            </div>
          ) : (
            <>
              <div className="results-stat-row">
                <div className="results-stat">
                  {searchStatus === 'strict_hit' && <><b title="所有关键词均命中的结果数">{total}</b> 篇严格匹配 · strict</>}
                  {searchStatus === 'loose_hit'  && <><b title="部分关键词命中的结果数（宽松模式）">{total}</b> 篇宽松匹配 · loose</>}
                  {searchStatus === 'vector_only' && <><b title="语义向量检索命中数">{total}</b> 篇语义匹配 · vector</>}
                  {searchStatus === 'too_many'   && <><b title="命中文档过多，请进一步缩小筛选范围">{total}</b> 篇匹配（过多）</>}
                  {searchStatus === 'no_hit'     && <>无匹配结果</>}
                  {!searchStatus && <>—</>}
                </div>
                <div className="results-mode-toggle">
                  <button className={`mode-btn ${mode === "strict" ? "mode-on" : ""}`}
                          onClick={() => setMode("strict")}>
                    <span className="mode-dot mode-dot-strict" /> 严格 Strict
                  </button>
                  <button className={`mode-btn ${mode === "loose" ? "mode-on" : ""}`}
                          onClick={() => setMode("loose")}>
                    <span className="mode-dot mode-dot-loose" /> 宽松 Loose
                  </button>
                </div>
              </div>

              {isTooMany && (
                <DisambiguateBanner
                  count={total}
                  suggestions={buildSuggestionsFromFacets(result.facets, params)}
                  onPick={(s) => setParams({ ...params, ...s.apply })}
                />
              )}

              {isLoose && result.banner && (
                <LooseNotice
                  banner={params.isSentence
                    ? '问句模式：已使用语义+关键词检索，结果按相关度排序。如需更精确的关键词匹配，请切换至严格模式。'
                    : result.banner}
                  isSentence={params.isSentence}
                  onRetry={() => setMode("strict")}
                />
              )}

              {isEmpty ? (
                <EmptyState onBack={() => setMode("strict")} />
              ) : (
                <div className={`result-grid ${density === "compact" ? "result-grid-compact" : ""}`}>
                  {hits.map((s) => (
                    <ResultCard key={s.doc.id} scored={s}
                      keywords={params.keywords} mode={isLoose ? "loose" : "strict"}
                      density={density} onOpen={() => onOpen(s.doc)} />
                  ))}
                </div>
              )}
            </>
          )}
        </main>
      </div>
    </div>
  );
}

function FilterGroup({ label, labelEn, children }) {
  return (
    <div className="filter-group">
      <div className="filter-group-head">
        <span>{label}</span>
        <span className="filter-group-en">{labelEn}</span>
      </div>
      <div className="filter-rows">{children}</div>
    </div>
  );
}

function FilterRow({ active, onClick, label, en, count, icon }) {
  return (
    <button className={`filter-row ${active ? "filter-row-on" : ""}`} onClick={onClick}>
      <span className="filter-row-main">
        {icon ? <Icon name={icon} size={12} /> : null}
        <span className="filter-row-label">{label}</span>
        {en ? <span className="filter-row-en">{en}</span> : null}
      </span>
      <span className="filter-row-count mono" title={`知识库中共 ${count} 篇文档属于此类别 · ${count} documents in this category`}>{count}</span>
    </button>
  );
}

function buildSuggestionsFromFacets(facets, params) {
  const out = [];
  if (!facets) return out;
  // Backend facets keys: "equipment", "project", "error_codes" (no by_ prefix).
  if (!params.equipment && facets.equipment) {
    Object.entries(facets.equipment)
      .sort((a, b) => b[1] - a[1]).slice(0, 3)
      .forEach(([eq, n]) => {
        out.push({ label: `仅看 ${eq} 机台`, hint: `${n} 篇文档 · ${n} docs`, apply: { equipment: eq } });
      });
  }
  if (!params.project && facets.project) {
    Object.entries(facets.project)
      .sort((a, b) => b[1] - a[1]).slice(0, 2)
      .forEach(([p, n]) => {
        out.push({ label: `仅看 ${p} 项目`, hint: `${n} 篇文档 · ${n} docs`, apply: { project: p } });
      });
  }
  // Show code suggestions only when few codes exist (avoid overwhelming the user)
  if (!params.code && facets.error_codes) {
    const codes = Object.entries(facets.error_codes).sort((a, b) => b[1] - a[1]);
    if (codes.length <= 6) {
      codes.slice(0, 2).forEach(([c, n]) => {
        out.push({ label: `报警代码 ${c}`, hint: `${n} 篇文档`, apply: { code: c } });
      });
    }
  }
  return out.slice(0, 4);
}

function AdminPage({ stats, onStatsRefresh }) {
  const typeDefs = window.KB_TYPE_DEFS || {};
  const [statsData, setStatsData]       = React.useState(stats);
  const [statsLoading, setStatsLoading] = React.useState(false);
  const [toast, setToast]               = React.useState(null);

  const showToast = (msg, kind = 'ok') => {
    setToast({ msg, kind });
    setTimeout(() => setToast(null), 3000);
  };
  const reloadStats = () => {
    setStatsLoading(true);
    fetch('/api/v1/documents/stats').then(r => r.json()).then(s => {
      setStatsData(s); onStatsRefresh(s); setStatsLoading(false);
    }).catch(() => setStatsLoading(false));
  };
  const reloadTaxonomy = () => {
    fetch('/api/v1/admin/reload-taxonomy', { method: 'POST' })
      .then(r => r.ok ? showToast('分类已重新加载 Taxonomy reloaded') : showToast('重载失败 Reload failed', 'err'))
      .catch(() => showToast('网络错误 Network error', 'err'));
  };

  const [formType, setFormType]     = React.useState(null);
  const [formValues, setFormValues] = React.useState({});
  const [formErrors, setFormErrors] = React.useState({});
  const [submitting, setSubmitting] = React.useState(false);
  const [lastDocId, setLastDocId]   = React.useState(null);

  const selectType = (kt) => { setFormType(kt); setFormValues({}); setFormErrors({}); setLastDocId(null); };
  const setField = (key, val) => {
    setFormValues(v => ({ ...v, [key]: val }));
    setFormErrors(e => ({ ...e, [key]: null }));
  };
  const validateForm = () => {
    const errs = {};
    (ADMIN_FIELDS[formType] || []).forEach(f => {
      if (f.required && !(formValues[f.key] || '').trim()) errs[f.key] = '必填 Required';
    });
    setFormErrors(errs);
    return Object.keys(errs).length === 0;
  };
  const submitForm = () => {
    if (!validateForm()) return;
    setSubmitting(true);
    const payload = { ...formValues };
    payload.error_codes = payload.error_codes
      ? payload.error_codes.split(',').map(s => s.trim()).filter(Boolean)
      : [];
    fetch(`/api/v1/documents/${formType}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    })
      .then(r => r.json().then(d => ({ ok: r.ok, data: d })))
      .then(({ ok, data }) => {
        setSubmitting(false);
        if (ok) { setLastDocId(data.id); setFormValues({}); showToast(`已添加 · ID: ${data.id}`); }
        else showToast(JSON.stringify(data.detail || data), 'err');
      })
      .catch(() => { setSubmitting(false); showToast('提交失败 Submit failed', 'err'); });
  };

  const liveStats = statsData || stats || {};
  const fields = ADMIN_FIELDS[formType] || [];

  return (
    <div className="admin-page">
      {toast && (
        <div className={`admin-toast admin-toast-${toast.kind}`}>
          <Icon name={toast.kind === 'err' ? 'info' : 'check'} size={14} />
          {toast.msg}
        </div>
      )}
      <div className="admin-inner">
        <section className="admin-section">
          <div className="admin-section-head">
            <h3 className="admin-section-title">统计 · Stats</h3>
            <button className="btn btn-sm" onClick={reloadStats} disabled={statsLoading}>
              {statsLoading ? '加载中…' : '刷新'}
            </button>
          </div>
          <div className="admin-stats-grid">
            <div className="admin-stat-card">
              <div className="admin-stat-num">{liveStats.total || 0}</div>
              <div className="admin-stat-label">总文档 Total</div>
            </div>
            {Object.entries(liveStats.by_type || {}).map(([k, v]) => (
              <div key={k} className="admin-stat-card">
                <div className="admin-stat-num">{v}</div>
                <div className="admin-stat-label">{typeDefs[k]?.zh || k}</div>
              </div>
            ))}
          </div>
        </section>

        <section className="admin-section">
          <div className="admin-section-head">
            <h3 className="admin-section-title">操作 · Actions</h3>
          </div>
          <div className="admin-actions">
            <button className="btn" onClick={reloadTaxonomy}>
              <Icon name="sparkle" size={13} /> 重新加载分类 Reload Taxonomy
            </button>
          </div>
        </section>

        <section className="admin-section">
          <div className="admin-section-head">
            <h3 className="admin-section-title">添加知识 · Add Knowledge</h3>
          </div>
          <div className="admin-type-pills">
            {['alarm', 'setup', 'experience'].map(kt => (
              <button key={kt}
                className={`admin-type-pill ${formType === kt ? 'admin-type-pill-on' : ''}`}
                onClick={() => selectType(kt)}>
                <Icon name={typeIconMap[kt]} size={13} />
                {typeDefs[kt]?.zh || kt}
              </button>
            ))}
          </div>
          {formType && (
            <div className="admin-form">
              {fields.map(f => (
                <div key={f.key} className="admin-field">
                  <label className="admin-label">
                    {f.label}{f.required && <span className="admin-required">*</span>}
                  </label>
                  {f.type === 'textarea'
                    ? <textarea
                        className={`admin-input admin-textarea ${formErrors[f.key] ? 'admin-input-err' : ''}`}
                        value={formValues[f.key] || ''}
                        onChange={e => setField(f.key, e.target.value)}
                        rows={4}
                      />
                    : <input
                        className={`admin-input ${formErrors[f.key] ? 'admin-input-err' : ''}`}
                        type="text"
                        value={formValues[f.key] || ''}
                        onChange={e => setField(f.key, e.target.value)}
                      />
                  }
                  {formErrors[f.key] && <span className="admin-field-err">{formErrors[f.key]}</span>}
                </div>
              ))}
              <div className="admin-form-foot">
                {lastDocId && (
                  <span className="admin-success">
                    <Icon name="check" size={13} /> 已添加 ID: <span className="mono">{lastDocId}</span>
                  </span>
                )}
                <button className="btn btn-primary" onClick={submitForm} disabled={submitting}>
                  {submitting ? '提交中…' : '提交 Submit'}
                </button>
              </div>
            </div>
          )}
        </section>
      </div>
    </div>
  );
}

  const [input, setInput]         = aUs('');
  const [loading, setLoading]     = aUs(false);
  const [panelSize, setPanelSize] = aUs({ w: 360, h: 480 });
  const [showQuickshots, setShowQuickshots] = aUs(false);
  const bottomRef = React.useRef(null);
  const inputRef  = React.useRef(null);

  const hits = results?.hits || [];

  // Build rich context for the system prompt
  const docsContext = hits.length > 0
    ? '\n\n当前检索到以下文档（按相关度排序）：\n' + hits.slice(0, 6).map((h, i) => {
        const d = h.doc;
        const snippets = Object.values(d.sections || {}).filter(Boolean).map(s => s.slice(0, 180)).join(' ');
        return `${i + 1}. 【${d.title}】类型:${d.type || '—'} 项目:${d.project || '—'} 机台:${d.equipment || '—'}\n   ${snippets}`;
      }).join('\n')
    : '';

  const systemPrompt = `你是半导体制造设备知识库助手，帮助工程师理解报警代码、设备操作和故障排查。只根据知识库实际内容作答，不确定时明确说明，不编造设备参数或步骤。回复请使用 Markdown 格式（标题、列表、代码块等）以便阅读。${context ? `\n\n用户当前查询：${context}` : ''}${docsContext}`;

  // Suggestions shown in the empty state — context-aware shortcuts
  const suggestions = aMemo(() => {
    const chips = [];
    if (hits.length > 0) {
      const first = hits[0].doc;
      chips.push(`「${first.title}」的处理步骤是什么？`);
      if (first.codes?.length) chips.push(`报警代码 ${first.codes[0]} 的根本原因？`);
      if (hits.length > 1) chips.push(`这 ${hits.length} 篇文档有什么区别？`);
      chips.push(`${first.project || '设备'} 的日常维护注意事项？`);
    } else {
      chips.push('真空系统报警如何处理？', '设备维护的注意事项有哪些？', '如何校准设备参数？');
    }
    return chips.slice(0, 4);
  }, [hits, context]);

  aCb(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  const sendText = async (text) => {
    if (!text || loading) return;
    const userMsg = { role: 'user', content: text };
    const history = [...messages, userMsg];
    setMessages(history);
    setInput('');
    setLoading(true);
    try {
      const resp = await fetch('/api/v1/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: [{ role: 'system', content: systemPrompt }, ...history],
        }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${resp.status}`);
      }
      const data = await resp.json();
      const reply = data.content || '（无回复）';
      setMessages(m => [...m, { role: 'assistant', content: reply }]);
    } catch (err) {
      setMessages(m => [...m, { role: 'assistant', content: `⚠ ${err.message}` }]);
    }
    setLoading(false);
    setTimeout(() => inputRef.current?.focus(), 50);
  };

  const send = () => sendText(input.trim());

  // Drag-to-resize from the top-left handle
  const onResizeStart = (e) => {
    e.preventDefault();
    const startX = e.clientX, startY = e.clientY;
    const startW = panelSize.w, startH = panelSize.h;
    const onMove = (me) => {
      setPanelSize({
        w: Math.max(280, Math.min(700, startW + (startX - me.clientX))),
        h: Math.max(320, Math.min(860, startH + (startY - me.clientY))),
      });
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };

  return (
    <div className="chat-panel" style={{ width: panelSize.w, height: panelSize.h }}>
      <div className="chat-resize-handle" onMouseDown={onResizeStart} title="拖动调整大小 Drag to resize" />
      <div className="chat-head">
        <span className="chat-head-title">
          <Icon name="sparkle" size={14} />
          AI 助手 · DeepSeek
        </span>
        <button className="icon-btn" onClick={onClose} aria-label="close chat">
          <Icon name="x" size={16} />
        </button>
      </div>

      <div className="chat-messages">
        {messages.length === 0 && (
          <>
            <div className="chat-empty">
              <Icon name="sparkle" size={22} />
              <p>您好！我是 AI 助手，可以帮您理解知识库内容。</p>
              <p style={{ opacity: .7, fontSize: '11.5px' }}>Hi — ask me about any document or alarm code.</p>
            </div>
            <div className="chat-suggestions">
              <div className="chat-suggestions-label">快速提问 Quick questions</div>
              {suggestions.map((s, i) => (
                <button key={i} className="chat-suggestion-chip" onClick={() => sendText(s)}>
                  <Icon name="arrow-right" size={12} />
                  {s}
                </button>
              ))}
            </div>
          </>
        )}
        {messages.map((m, i) => (
          <div key={i} className={`chat-msg chat-msg-${m.role}`}>
            {m.role === 'assistant'
              ? <div className="chat-msg-content chat-md" dangerouslySetInnerHTML={{ __html: window.marked ? window.marked.parse(m.content) : m.content }} />
              : <div className="chat-msg-content">{m.content}</div>
            }
          </div>
        ))}
        {loading && (
          <div className="chat-msg chat-msg-assistant">
            <div className="chat-msg-content chat-loading">
              <span /><span /><span />
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      <div className="chat-input-area">
        {messages.length > 0 && showQuickshots && (
          <div className="chat-quickshots">
            {suggestions.map((s, i) => (
              <button key={i} className="chat-quickshot-chip" onClick={() => { sendText(s); setShowQuickshots(false); }}>
                <Icon name="arrow-right" size={10} />{s}
              </button>
            ))}
          </div>
        )}
        <div className="chat-input-row">
          {messages.length > 0 && (
            <button
              className={`chat-hint-btn${showQuickshots ? ' active' : ''}`}
              title="快捷问题 / Quick questions"
              onClick={() => setShowQuickshots(s => !s)}
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10" /><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" /><path d="M12 17h.01" />
              </svg>
            </button>
          )}
          <input
            ref={inputRef}
            className="chat-input"
            placeholder="问一个问题… / Ask a question…"
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
            disabled={loading}
            autoFocus
          />
          <button className="btn btn-primary btn-sm" onClick={send} disabled={!input.trim() || loading}>
            <Icon name="arrow-right" size={14} />
          </button>
        </div>
      </div>
    </div>
  );
}
// --- Root
function App() {
  const [t, setTweak] = useTweaks(/*EDITMODE-BEGIN*/{
    "accent": "#4F4FAE",
    "density": "comfortable",
    "matchMode": "strict",
    "paramDisplay": "chips"
  }/*EDITMODE-END*/);

  const [page, setPage]         = aUs("landing");
  const [params, setParams]     = aUs(null);
  const [openDoc, setOpenDoc]   = aUs(null);
  const [taxonomy, setTax]      = aUs(null);
  const [stats, setStats]       = aUs(null);
  const [chatOpen, setChatOpen] = aUs(false);
  const [chatResults, setChatResults] = aUs(null);

  // Load taxonomy + stats from ES on mount (loadKBData auto-falls-back on failure)
  aUe(() => {
    window.KB_LOAD && window.KB_LOAD().then(({ tax, stats }) => {
      setTax(tax);
      setStats(stats);
    });
  }, []);

  // Apply accent palette to root
  aUe(() => {
    const palette = {
      "#4F4FAE": { soft: "oklch(0.95 0.03 265)", on: "#fff" },
      "#4B5563": { soft: "oklch(0.94 0.01 240)", on: "#fff" },
      "#0F9F73": { soft: "oklch(0.95 0.04 160)", on: "#fff" },
      "#C68C26": { soft: "oklch(0.95 0.05 70)",  on: "#1a1a1a" },
    };
    const meta = palette[t.accent] || palette["#4F4FAE"];
    document.documentElement.style.setProperty("--accent", t.accent);
    document.documentElement.style.setProperty("--accent-soft", meta.soft);
    document.documentElement.style.setProperty("--on-accent", meta.on);
  }, [t.accent]);

  aUe(() => {
    document.documentElement.dataset.density = t.density;
  }, [t.density]);

  const submitQuery = async (q) => {
    const rulesBased = parseQuery(q);
    if (window.saveRecentSearch) window.saveRecentSearch(q, rulesBased.project, rulesBased.equipment);
    // Navigate immediately with rule-based params; LLM extraction refines asynchronously.
    setParams(rulesBased);
    setPage("results");
    setOpenDoc(null);
    try {
      const resp = await fetch('/api/v1/extract', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: q }),
        signal: AbortSignal.timeout(4000),
      });
      if (resp.ok) {
        const llm = await resp.json();
        setParams({
          project:    llm.project    || rulesBased.project,
          equipment:  llm.equipment  || rulesBased.equipment,
          code:       llm.error_codes?.[0] || rulesBased.code,
          type:       llm.knowledge_type   || rulesBased.type,
          keywords:   llm.keywords?.length ? llm.keywords : rulesBased.keywords,
          raw:        q,
          isSentence: llm.is_sentence ?? rulesBased.isSentence,
        });
      }
    } catch (_) { /* rule-based params already set; LLM extraction optional */ }
  };

  return (
    <div className="app">
      <AppHeader
        onHome={() => { setPage("landing"); setParams(null); setOpenDoc(null); }}
        onLibrary={() => { setPage("library"); setOpenDoc(null); }}
        onAdmin={() => { setPage("admin"); setOpenDoc(null); }}
        page={page}
      />

      <div className="app-body">
        {page === "landing" ? (
          <Landing
            taxonomy={taxonomy}
            stats={stats}
            onSubmit={submitQuery}
            onPickRecent={(r) => submitQuery(r.q)}
            onPickType={(tId) => {
              setParams({ project: null, equipment: null, code: null, type: tId, keywords: [], raw: `类型：${tId}` });
              setPage("results");
            }}
          />
        ) : page === "library" ? (
          <LibraryPage taxonomy={taxonomy} stats={stats} density={t.density} onOpen={(d) => setOpenDoc(d)} />
        ) : page === "admin" ? (
          <AdminPage stats={stats} onStatsRefresh={(s) => setStats(s)} />
        ) : (
          <ResultsPage
            taxonomy={taxonomy}
            stats={stats}
            params={params}
            setParams={setParams}
            mode={t.matchMode}
            setMode={(m) => setTweak("matchMode", m)}
            paramDisplay={t.paramDisplay}
            density={t.density}
            onOpen={(d) => setOpenDoc(d)}
            onResultsChange={setChatResults}
          />
        )}
      </div>

      {openDoc ? (
        <Detail
          doc={openDoc}
          keywords={page === "results" && params ? params.keywords : []}
          onClose={() => setOpenDoc(null)}
        />
      ) : null}

      {/* AI Chat FAB + Panel */}
      <button
        className="chat-fab"
        title="AI 助手 · Chat"
        onClick={() => setChatOpen(o => !o)}
        aria-label={chatOpen ? "Close AI chat" : "Open AI chat"}
      >
        {chatOpen ? <Icon name="x" size={20} /> : <Icon name="sparkle" size={20} />}
      </button>
      {chatOpen && (
        <AIChatPanel
          context={
            page === 'results' && params
              ? `查询: ${params.raw || ''}${params.project ? ` · 项目: ${params.project}` : ''}${params.equipment ? ` · 机台: ${params.equipment}` : ''}${params.type ? ` · 类型: ${params.type}` : ''}`
              : null
          }
          results={chatResults}
          onClose={() => setChatOpen(false)}
        />
      )}

      {/* Tweaks Panel */}
      <TweaksPanel title="Tweaks">
        <TweakSection label="主题 · Theme">
          <TweakColor
            label="Accent"
            value={t.accent}
            onChange={(v) => setTweak("accent", v)}
            options={["#4F4FAE", "#4B5563", "#0F9F73", "#C68C26"]}
          />
        </TweakSection>

        <TweakSection label="布局 · Layout">
          <TweakRadio
            label="Density"
            value={t.density}
            onChange={(v) => setTweak("density", v)}
            options={[
              { value: "comfortable", label: "Comfort" },
              { value: "compact",     label: "Compact" },
            ]}
          />
          <TweakRadio
            label="参数展示 Params"
            value={t.paramDisplay}
            onChange={(v) => setTweak("paramDisplay", v)}
            options={[
              { value: "chips",    label: "Chips" },
              { value: "sentence", label: "Sentence" },
            ]}
          />
        </TweakSection>

        <TweakSection label="检索模式 · Match">
          <TweakRadio
            label="Match mode"
            value={t.matchMode}
            onChange={(v) => setTweak("matchMode", v)}
            options={[
              { value: "strict", label: "Strict" },
              { value: "loose",  label: "Loose" },
            ]}
          />
          <div className="tweak-note">
            Loose mode demos the fallback state: keywords joined by OR, with a notice that AI did not find an exact match.
          </div>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
